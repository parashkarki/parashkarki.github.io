// ══════════════ ENGINE ══════════════
let cur=0,busy=false,sbOn=true;
const TOT=PGS.length,seen=new Set([0]);

function render(pg,dir){
  if(busy&&dir!==0)return;
  busy=true;
  const sh=document.getElementById('fsh');
  sh.className='';void sh.offsetWidth;
  if(dir>0)sh.className='sr';else if(dir<0)sh.className='sl';
  document.getElementById('col').innerHTML=PGS[pg].h;
  document.getElementById('scroll').scrollTop=0;
  document.getElementById('FPNUM').textContent=(pg+1)+' / '+TOT;
  document.getElementById('FRIGHT').textContent=PGS[pg].t;
  document.getElementById('PTITLE').textContent=PGS[pg].t;
  document.getElementById('CL').style.display=pg===0?'none':'flex';
  document.getElementById('CR').style.display=pg===TOT-1?'none':'flex';
  document.getElementById('NP').disabled=pg===0;
  document.getElementById('NN').disabled=pg===TOT-1;
  seen.add(pg);updateDots();updateSB(pg);
  setTimeout(()=>busy=false,400);
}

function F(dir){const n=cur+dir;if(n<0||n>=TOT||busy)return;cur=n;render(cur,dir)}
function G(pg){const d=pg>cur?1:pg<cur?-1:0;cur=Math.max(0,Math.min(TOT-1,pg));render(cur,d);showV('b')}

function updateDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('on',i===cur);
    d.classList.toggle('vis',seen.has(i)&&i!==cur);
  });
}
function buildDots(){
  const c=document.getElementById('FDOTS');
  for(let i=0;i<TOT;i++){
    const d=document.createElement('div');d.className='dot';
    d.title='Page '+(i+1)+': '+PGS[i].t;
    d.onclick=(()=>{const p=i;return()=>G(p)})();
    c.appendChild(d);
  }
}

// Sidebar
function buildSB(){
  document.getElementById('sb-list').innerHTML=PGS.map((pg,i)=>`
    <div class="si${i===0?' on vis':''}" id="si${i}" onclick="G(${i})">
      <span class="si-n">${String(i+1).padStart(2,'0')}</span>
      <span class="si-l">${pg.t}</span>
    </div>`).join('');
}
function updateSB(pg){
  document.querySelectorAll('.si').forEach((el,i)=>{
    el.classList.toggle('on',i===pg);
    if(seen.has(i))el.classList.add('vis');
  });
  const a=document.getElementById('si'+pg);
  if(a)a.scrollIntoView({block:'nearest',behavior:'smooth'});
}
function togSB(){
  sbOn=!sbOn;
  const sb=document.getElementById('sb');
  const btn=document.getElementById('sb-open');
  const tog=document.getElementById('sb-tog');
  const cl=document.getElementById('CL');
  const np=document.getElementById('NP');
  if(sbOn){
    sb.style.width=window.innerWidth>900?'220px':'190px';
    sb.style.borderRight='1px solid rgba(200,160,80,.18)';
    btn.classList.remove('show');tog.textContent='◀';
    cl.classList.remove('sboff');np.classList.remove('sboff');
  } else {
    sb.style.width='0';sb.style.borderRight='none';
    btn.classList.add('show');tog.textContent='▶';
    cl.classList.add('sboff');np.classList.add('sboff');
  }
}

// Keys & touch
document.addEventListener('keydown',e=>{
  if(document.querySelector('.ov.on'))return;
  if(e.key==='ArrowRight'||e.key===' '||e.key==='ArrowDown'){e.preventDefault();F(1)}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();F(-1)}
});
let tx=null;
document.getElementById('scroll').addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
document.getElementById('scroll').addEventListener('touchend',e=>{
  if(tx===null)return;
  if(Math.abs(e.changedTouches[0].clientX-tx)>50)F(e.changedTouches[0].clientX-tx<0?1:-1);
  tx=null;
},{passive:true});

// ══════════════ QUIZ ══════════════
const QZ=[
{q:"What does DBMS stand for and what three elements does it consist of?",o:["Data Backup Management System — files, programs, users","Database Management System — interrelated data, programs to access it, and a convenient+efficient environment","Database Monitoring System — logging, indexing, caching","Distributed Binary Management Server — nodes, queries, replication"],a:1,e:"DBMS = Database Management System. Its three elements: (1) a collection of interrelated data, (2) a set of programs to access the data, and (3) an environment that is both convenient and efficient to use."},
{q:"Which file-system problem occurs when the same data is duplicated in multiple files, causing inconsistencies when one copy is updated but others are not?",o:["Data Isolation","Atomicity Failure","Data Redundancy and Inconsistency","Concurrent Access Problem"],a:2,e:"Data Redundancy and Inconsistency — data stored in multiple file formats resulting in duplication. Updating one copy while missing others causes inconsistency across the system."},
{q:"Ted Codd defined the relational data model in 1970. Which award did he receive?",o:["Nobel Prize in Computing 1975","Fields Medal 1972","ACM Turing Award 1981","IEEE Von Neumann Medal 1980"],a:2,e:"Ted Codd received the ACM Turing Award in 1981 for defining the relational data model. IBM Research built System R and UC Berkeley built Ingres as research prototypes."},
{q:"A bank transfer debits Account A then credits Account B. The server crashes between these steps. Which ACID property ensures the database is restored to a consistent state?",o:["Consistency","Isolation","Durability","Atomicity"],a:3,e:"Atomicity = 'all or nothing'. If any step fails, ALL changes are rolled back. The fund transfer either completes fully or is entirely cancelled."},
{q:"Which level of the three data abstraction levels describes HOW a record is physically stored on disk, including file formats, block sizes, and index structures?",o:["View Level","Logical Level","Application Level","Physical Level"],a:3,e:"The Physical Level describes HOW data is stored on disk — file formats, block sizes, compression, B+-tree index structures, byte layout."},
{q:"Which type of DML requires a user to specify only WHAT data is needed, without specifying how to retrieve it?",o:["Procedural DML — specifies WHAT and HOW","Turing-complete DML","Declarative (Non-procedural) DML — specifies only WHAT","Embedded DML"],a:2,e:"Declarative (Non-procedural) DML requires only WHAT data is needed — the system determines HOW. SQL is the most widely used declarative DML. The lecture explicitly states 'Declarative DMLs are usually easier to learn and use.'"},
{q:"Which Storage Manager component manages the cache of frequently accessed database pages in RAM to avoid slow disk reads?",o:["Authorization and Integrity Manager","File Manager","Transaction Manager","Buffer Manager"],a:3,e:"The Buffer Manager maintains the buffer pool — a RAM cache of hot database pages. RAM is ~1,000× faster than SSD, so keeping hot pages in RAM dramatically speeds up queries."},
{q:"In three-tier architecture, what sits between the client browser and the database server?",o:["Firewall and Security Layer","Application Server (Middle Tier)","Network Load Balancer","Database Proxy Cache"],a:1,e:"Three-tier: Client (browser, NO direct DB calls) → Application Server (business logic, forms interface) → Database Server. The client communicates with the app server through a forms interface."},
{q:"What is the key difference between a database Schema and an Instance?",o:["Schema = actual current data; Instance = structural definition","Schema = structural blueprint (type); Instance = actual data at a point in time (value)","They are synonymous — both refer to DB structure","Schema = physical storage; Instance = SQL query results"],a:1,e:"Schema is the overall logical structure (analogous to type information of a variable). Instance is the actual content at a particular point in time (analogous to the value of a variable). Schemas change rarely; instances change constantly."},
{q:"Which decade saw the rise of 'NoSQL' systems like Google BigTable, MapReduce, and MongoDB?",o:["1970s","1990s","2010s","2000s"],a:3,e:"The 2000s saw big data storage systems (Google BigTable 2004, Yahoo PNuts, Amazon DynamoDB) and 'NoSQL' systems (MongoDB, Cassandra, Redis). MapReduce (2004) sparked the Hadoop ecosystem."},
{q:"Which Query Processor component performs query optimization — generating multiple execution plans and selecting the lowest-cost one?",o:["DDL Interpreter","Query Evaluation Engine","DML Compiler","Transaction Manager"],a:2,e:"The DML Compiler translates DML statements AND performs query optimization — picks the lowest cost plan. Two equivalent queries can differ by 1,000×!"},
{q:"What does Physical Data Independence specifically enable?",o:["Ability to query without knowing SQL","Ability to modify the physical schema without changing the logical schema or applications","Ability to distribute data geographically","Ability to encrypt data at hardware level"],a:1,e:"Physical Data Independence = ability to modify the physical schema (change storage, add index) without changing the logical schema or application programs."},
{q:"What does the Data Dictionary store?",o:["Actual user data — all database records","Backup copies of tables","Metadata — database schema, integrity constraints, authorization, and statistics","Network configuration settings"],a:2,e:"The Data Dictionary stores metadata: database schema, integrity constraints, authorization rules, and statistical information — used by the query optimizer for cost estimation."},
{q:"Which type of database user writes application programs using embedded SQL, JDBC, or ODBC?",o:["Naive User","Application Programmer","Database Administrator","Sophisticated User"],a:1,e:"Application Programmers write programs using DML calls (embedded SQL, JDBC, ODBC). They build the web apps, mobile apps, and desktop software that naive users interact with."},
{q:"What does the Concurrency-Control Manager do?",o:["Backs up the database periodically","Controls interaction among concurrent transactions to ensure consistency","Optimises query execution plans","Manages physical disk space allocation"],a:1,e:"The Concurrency-Control Manager controls the interaction among concurrent transactions to ensure database consistency — preventing lost updates, dirty reads, and phantom reads."},
{q:"Why is SQL NOT sufficient as a standalone language for building complete applications?",o:["SQL is too slow for production use","SQL does not support user input, display output, or network communication (이것들은 프로그램 영역)","SQL has no data types for complex objects","SQL can only read data, not insert or update"],a:1,e:"SQL does not support user input, display output, or network communication. Such computations must be in a host language (C/C++, Java, Python) with embedded SQL queries."},
{q:"Magnetic tapes in the 1950s–60s had which fundamental data access limitation?",o:["Random access — jump to any record","Direct access — skip to a block","Indexed access — use a sorted key file","Sequential access ONLY — must read all records before the target"],a:3,e:"Magnetic tapes provided ONLY sequential access. To find record N, you had to read all records before it. Hard disks in the late 1960s solved this with random access."},
{q:"What were the two pioneering relational database research prototypes built in the 1970s?",o:["Oracle and MySQL","System R (IBM Research) and Ingres (UC Berkeley, Stonebraker)","BigTable and DynamoDB","DB2 and PostgreSQL"],a:1,e:"IBM Research built System R and UC Berkeley (Michael Stonebraker) built Ingres — both pioneering relational DB prototypes in the 1970s."},
{q:"What are the three physical data structures implemented by the Storage Manager?",o:["Tables, Views, and Stored Procedures","Data Files (actual records), Data Dictionary (metadata/schema), and Indices (fast access pointers)","Schemas, Instances, and Physical Schemas","Buffer Pool, Transaction Log, and Checkpoint Files"],a:1,e:"The Storage Manager implements: (1) Data Files — store actual records on disk, (2) Data Dictionary — stores metadata/schema, and (3) Indices — provide fast access via pointers to data items holding particular values."},
{q:"The DBA function 'Schema Definition' refers to what?",o:["Running periodic backup jobs","Creating the original database schema using DDL statements","Managing network firewall rules","Optimising slow SQL queries"],a:1,e:"Schema definition = the DBA creates the original database schema (table definitions, constraints, relationships) using DDL (Data Definition Language) statements like CREATE TABLE."},
{q:"What was the major database trend in the 2010s?",o:["Complete death of SQL","SQL reloaded — SQL front-ends to MapReduce (Apache Hive, Spark SQL) and massively parallel + multi-core in-memory databases","Return to hierarchical databases","Elimination of transaction management"],a:1,e:"The 2010s saw 'SQL reloaded' — SQL front-ends to MapReduce (Apache Hive, Spark SQL), plus massively parallel database systems (Redshift) and multi-core main-memory databases (SAP HANA, VoltDB)."},
{q:"In ACID, what does Isolation specifically guarantee?",o:["Committed changes survive system failures","DB moves from one consistent state to another","Concurrent transactions do not see each other's partial (intermediate) state","All operations complete or none do"],a:2,e:"Isolation ensures concurrent transactions don't interfere — each executes as if it were the only one running. Without isolation you get dirty reads, lost updates, and phantom reads."},
{q:"What is the correct flow for a three-tier web application request?",o:["Database Server pulls request from Client","Client Browser (Tier 1) → Application Server (Tier 2, business logic, forms interface) → Database Server (Tier 3)","Client Browser connects directly to the Database","Load Balancer → DB Cluster → Cache → Client"],a:1,e:"Three-tier: Client browser (Tier 1, NO direct DB calls) sends request to Application Server (Tier 2, forms interface, business logic) which queries Database Server (Tier 3)."},
{q:"Which file-system problem occurs when integrity constraints like 'account balance > 0' cannot be properly enforced?",o:["Data Isolation","Concurrency Problem","Integrity Problems — constraints buried in program code, not at data level","Security Problem"],a:2,e:"Integrity Problems — constraints like 'account balance > 0' become buried in program code rather than being stated explicitly. This makes it hard to add new constraints or change existing ones."},
{q:"What distinguishes the Logical Schema from the Physical Schema?",o:["Logical = how data is stored on disk; Physical = what tables exist","Logical = overall logical structure (what data and relationships); Physical = overall physical structure (how data is stored on disk)","Logical = current data contents; Physical = query execution plans","Logical = user views; Physical = backup copies"],a:1,e:"Logical Schema = overall logical structure — what tables exist, their columns, relationships, constraints. Physical Schema = overall physical structure — file organisation, block sizes, index structures."},
{q:"Which component of the Database Engine is responsible for the interaction with the OS file manager and efficient storing/retrieving/updating of data?",o:["Query Processor — handles SQL parsing and optimization","Storage Manager — provides interface between disk data and applications","Transaction Manager — ensures ACID properties","Authorization Manager — checks user permissions"],a:1,e:"The Storage Manager provides the interface between low-level data stored in the database and application programs and queries. It is responsible for interaction with the OS file manager and efficient storing, retrieving, and updating of data."},
{q:"What is the purpose of an Index in a database system?",o:["To store backup copies of tables","To encrypt sensitive data on disk","To provide fast access to data items by storing pointers to records holding particular values","To define the table structure and constraints"],a:2,e:"A database index provides pointers to those data items that hold a particular value — like a book index with page numbers. It allows O(log n) lookup instead of O(n) full table scan. Example: find GPA=4.0 in 0.001s instead of 5 seconds."},
{q:"In the relational model, what is a 'tuple'?",o:["A column/attribute of a table","A single row/record in a relation (table)","A foreign key constraint","A data type for complex objects"],a:1,e:"In the relational model, a tuple is a single row (record) in a relation (table). Each tuple represents one entity — e.g., one instructor with their ID, name, dept_name, and salary values."},
{q:"What is a 'Foreign Key' in a relational database?",o:["A key that uniquely identifies each row in its own table","An attribute whose value must match a value in another table's primary key — enforcing referential integrity","A key used to encrypt sensitive data","A temporary key used only during transactions"],a:1,e:"A Foreign Key is an attribute whose value must match a value in another table's primary key. For example, dept_name in 'instructor' must match a dept_name in 'department'. This enforces referential integrity automatically."},

const QNA=[
{cat:"Fundamentals",q:"List and explain all 7 file-system problems that led to DBMS.",a:`<span class="ap"><strong>1. Data Redundancy &amp; Inconsistency:</strong> Same data in multiple files in different formats. Update one, miss others → inconsistent data. Example: patient phone in 3 hospital files, only 1 updated.</span>
<span class="ap"><strong>2. Difficulty Accessing Data:</strong> Need a new program for each new task — no general-purpose query mechanism.</span>
<span class="ap"><strong>3. Data Isolation:</strong> Data in multiple files with incompatible formats — combining data extremely hard.</span>
<span class="ap"><strong>4. Integrity Problems:</strong> Constraints like "balance &gt; 0" buried in program code, not at data level. Hard to add or change rules.</span>
<span class="ap"><strong>5. Atomicity Failures:</strong> Crashes during partial updates (debit done, credit not) left DB corrupted with no rollback.</span>
<span class="ap"><strong>6. Concurrent Access Problems:</strong> Two users read balance=₩100, both withdraw ₩50, both write ₩50 → ₩50 appears from nowhere (Lost Update Problem).</span>
<span class="ap"><strong>7. Security Problems:</strong> Nearly impossible to give users access to some data but not all — no fine-grained control.</span>
<em>Because of these 7 problems, centralised database systems replaced file systems.</em>`},
{cat:"Comparison",q:"Compare File System vs DBMS across 8 key dimensions.",a:`<span class="ap"><strong>Data Redundancy:</strong> File system = high redundancy, data duplicated → inconsistency. DBMS = single source of truth, minimal redundancy, automatic consistency enforcement.</span>
<span class="ap"><strong>Data Access:</strong> File system = write new program for every query. DBMS = general-purpose SQL handles any query without new programming.</span>
<span class="ap"><strong>Integrity Constraints:</strong> File system = constraints buried in program code. DBMS = constraints declared in schema, enforced automatically at the data level.</span>
<span class="ap"><strong>Atomicity:</strong> File system = no rollback mechanism, partial updates possible. DBMS = full ACID transaction support with undo/redo logs.</span>
<span class="ap"><strong>Concurrency:</strong> File system = no control → lost updates occur. DBMS = Concurrency-Control Manager prevents lost updates, dirty reads, phantom reads.</span>
<span class="ap"><strong>Security:</strong> File system = all-or-nothing file permissions. DBMS = fine-grained role-based access control (GRANT/REVOKE on specific tables and columns).</span>
<span class="ap"><strong>Data Sharing:</strong> File system = must copy data between programs. DBMS = multiple applications share the same database simultaneously.</span>
<span class="ap"><strong>Backup/Recovery:</strong> File system = manual and unreliable. DBMS = automatic backup with point-in-time recovery.</span>`},
{cat:"Abstraction",q:"Explain the three levels of data abstraction with lecture examples.",a:`<strong>Physical Level (lowest):</strong> Describes HOW a record (e.g., instructor) is stored on disk — physical file format, block sizes, compression, B+-tree index structures, byte offsets. Most users never see this.
<span class="ap">Lecture example: type instructor = record ID:string; name:string; dept_name:string; salary:integer; end;</span>
<strong>Logical Level (middle):</strong> Describes WHAT data is stored and relationships. The schema that programmers and DBAs work with.
<strong>View Level (highest):</strong> Application programs hide details of data types. Views can hide information (e.g., salary) for security. Different users see different views.
<span class="ap">Example: Doctor sees medical history. Billing sees charges. Admin sees contact info. All from the same physical data.</span>
<em>Key principle: "The interfaces between levels should be well defined so that changes in some parts do not seriously influence others." — data independence!</em>`},
{cat:"Languages",q:"What is DDL vs DML? Give SQL examples from the lecture and explain the Data Dictionary.",a:`<strong>DDL (Data Definition Language):</strong> Defines the database schema. DDL compiler generates table templates stored in the data dictionary. Does NOT insert data.
<span class="ap">Example: CREATE TABLE instructor (ID char(5), name varchar(20), dept_name varchar(20), salary numeric(8,2));</span>
Stores in Data Dictionary: schema, integrity constraints (Primary Key: ID), and authorization.
<strong>DML (Data Manipulation Language):</strong> Language for accessing and updating data. Two types: Procedural (WHAT + HOW) and Declarative/Non-procedural (WHAT only — SQL is declarative).
<span class="ap">Example: select name from instructor where dept_name = 'Comp. Sci.'</span>
<strong>Data Dictionary:</strong> A special internal database storing metadata — schema, integrity constraints, authorization rules, and statistical information used by the query optimizer for cost estimation.`},
{cat:"ACID",q:"Explain all 4 ACID properties with the fund transfer example.",a:`A transaction is a collection of operations performing a single logical function. Transfer ₩100,000 from Account A to Account B:
<span class="ap"><strong>A — Atomicity:</strong> "Transfer should either complete or not happen at all." If server crashes after debiting A but before crediting B, atomicity ensures the debit is ROLLED BACK — money never lost. Implemented via undo log.</span>
<span class="ap"><strong>C — Consistency:</strong> DB must be in a valid state before and after. All constraints hold — balance ≥ 0, total money conserved. If a constraint would be violated, the transaction rolls back.</span>
<span class="ap"><strong>I — Isolation:</strong> "Two people reading balance=100 and both withdrawing 50 at same time" → Lost Update. Isolation ensures each transaction executes as if it were the only one running. Implemented via locks or MVCC.</span>
<span class="ap"><strong>D — Durability:</strong> Once committed, changes are permanent — even if system fails immediately afterward. Implemented via redo log (WAL — Write-Ahead Log).</span>`},
{cat:"Architecture",q:"Compare Two-Tier vs Three-Tier architecture — when to use each.",a:`<strong>Two-Tier:</strong> "The application resides at the client machine, where it invokes database system functionality at the server machine." Client contains direct DB calls.
<span class="ap">Use case: Desktop applications, internal tools, small-scale deployments.</span>
<span class="ap">Pros: Simple, lower latency. Cons: DB exposed to clients (security risk), hard to scale, business logic changes require updating all clients.</span>
<strong>Three-Tier:</strong> "The client machine acts as a front end and does not contain any direct database calls. The client communicates with an application server through a forms interface. The application server communicates with the database system."
<span class="ap">Use case: ALL modern web applications, mobile apps, public-facing systems.</span>
<span class="ap">Pros: DB never exposed to internet (security), multiple app servers share one DB (scalability), change business logic by updating only app server (maintainability), any client type uses same app server (flexibility).</span>`},
{cat:"Storage Manager",q:"Describe the Storage Manager — its 4 components and 3 data structures.",a:`<strong>Definition:</strong> A program module providing the interface between low-level data stored in the database and application programs and queries. Responsible for: interaction with the OS file manager, and efficient storing, retrieving, and updating of data.
<strong>Four Components:</strong>
<span class="ap"><strong>1. Authorization and Integrity Manager:</strong> Tests integrity constraints before any write. Checks access authorization before any data operation.</span>
<span class="ap"><strong>2. Transaction Manager:</strong> Ensures ACID properties. Manages undo log (rollback on failure) and redo log (recovery after crash).</span>
<span class="ap"><strong>3. File Manager:</strong> Manages disk space allocation — determines which data goes in which physical file and block.</span>
<span class="ap"><strong>4. Buffer Manager:</strong> Manages buffer pool (RAM cache of hot pages). RAM ~1,000× faster than SSD — critical for performance. Uses LRU replacement algorithm.</span>
<strong>Three Physical Data Structures:</strong>
<span class="ap"><strong>1. Data Files:</strong> Store the actual database records — every row of every table on disk as fixed-size blocks.</span>
<span class="ap"><strong>2. Data Dictionary:</strong> Stores metadata — schema, constraints, authorization, and statistics for query optimization.</span>
<span class="ap"><strong>3. Indices:</strong> Provide fast access — pointers to data items holding particular values. B+-tree allows O(log n) lookup vs O(n) full scan.</span>`},
{cat:"Query Processing",q:"Walk through all 3 query processing steps. Why is step 2 (optimization) the most important?",a:`<strong>Step 1 — Parsing and Translation:</strong> SQL string is parsed (syntax checked), validated against the data dictionary, and translated into a relational algebra expression. Syntax errors reported immediately.
<strong>Step 2 — Optimization (Most Important!):</strong> The DML Compiler performs query optimization — picks the lowest cost evaluation plan from among the various alternatives. The optimizer:
<span class="ap">Generates multiple alternative physical execution plans (different join algorithms, join orderings, index scan vs full table scan).</span>
<span class="ap">Estimates cost of each plan using data dictionary statistics (table row counts, column value distributions, index availability).</span>
<span class="ap">Selects the plan with the lowest estimated total cost. Two equivalent queries can differ by 1,000×!</span>
<strong>Step 3 — Evaluation:</strong> The Query Evaluation Engine executes the chosen physical plan, accessing data through the storage manager (Buffer Manager serves RAM-cached pages), and returns the result relation.`},
{cat:"Data Models",q:"Compare all 6 data models — what each is and when to use it.",a:`<strong>Relational Model</strong> (Ted Codd, 1970): Data in tables with rows and columns, linked by foreign keys. SQL is the query language. Use for virtually all business data. Examples: MySQL, PostgreSQL, Oracle.
<span class="ap"><strong>Entity-Relationship (ER) Model:</strong> Visual tool — entities, attributes, relationships. Use for: designing the logical schema before building the database. Not directly implemented as a database.</span>
<span class="ap"><strong>Object-based Models:</strong> Combine OOP concepts with DB management. Use for: complex data with rich behaviour — CAD/CAM, multimedia. Examples: PostgreSQL object-relational features.</span>
<span class="ap"><strong>Semi-structured (XML/JSON):</strong> Flexible, self-describing data. Use for: web services, APIs, document storage. Examples: MongoDB (JSON), Firebase.</span>
<span class="ap"><strong>Hierarchical Model (older):</strong> Tree structure — single root, each child has one parent. Legacy systems only (IBM IMS). Cannot represent many-to-many relationships naturally.</span>
<span class="ap"><strong>Network Model (older):</strong> Graph structure with pointer-linked records. Legacy systems only. Complex navigation, difficult to query.</span>`},
{cat:"Users",q:"Describe all 4 types of database users and how each interacts with the system.",a:`<strong>1. Naive Users:</strong> Unsophisticated users who interact through pre-written application programs. No knowledge of SQL or that a database exists. Use forms, mobile apps, web pages. Examples: students checking grades, bank customers at ATM, shoppers on Coupang.
<strong>2. Application Programmers:</strong> IT professionals who write the application programs that naive users interact with. Use embedded SQL, JDBC (Java), ODBC (C/C++), Python DB-API, or ORM frameworks (Hibernate, Django ORM).
<strong>3. Sophisticated Users (Analysts):</strong> Business analysts, data scientists, researchers who formulate requests directly in SQL without writing full programs. Write complex multi-table JOINs, aggregations, window functions. Use SQL clients, BI tools (Tableau, Power BI), Jupyter notebooks.
<strong>4. Database Administrator (DBA):</strong> Has central control. Functions: schema definition (CREATE TABLE), storage structure definition (CREATE INDEX), schema modification (ALTER TABLE), granting authorization (GRANT/REVOKE), routine maintenance — periodically backing up the database, ensuring enough free disk space, and monitoring jobs running on the database for performance issues.`},
{cat:"History",q:"Trace the complete evolution of database systems from the 1950s through the 2010s.",a:`<strong>1950s and early 1960s:</strong> Data processing using magnetic tapes — ONLY sequential access. Punched cards for input. No concept of a database system.
<strong>Late 1960s and 1970s:</strong> Hard disks enable direct (random) access. Network and hierarchical models in widespread use. Ted Codd (IBM) defines the relational data model (1970). IBM Research builds System R; UC Berkeley (Stonebraker) builds Ingres. Oracle releases first commercial relational DB (1979). High-performance transaction processing emerges.
<span class="ap"><strong>1980s:</strong> Research prototypes → commercial systems. SQL becomes the industrial standard. Parallel and distributed DB systems (Wisconsin, IBM, Teradata). IBM DB2, Oracle, Sybase dominate.</span>
<span class="ap"><strong>1990s:</strong> Multi-terabyte data warehouses. Emergence of Web commerce. OLAP for business intelligence. MySQL and PostgreSQL as open-source alternatives.</span>
<span class="ap"><strong>2000s:</strong> Google BigTable (2004), Yahoo PNuts, Amazon DynamoDB. "NoSQL" systems — MongoDB, Cassandra, Redis. MapReduce and Apache Hadoop.</span>
<span class="ap"><strong>2010s:</strong> SQL reloaded — Apache Hive and Spark SQL. Massively parallel databases (Redshift, Snowflake). Multi-core main-memory databases (SAP HANA, VoltDB). NewSQL combines SQL reliability with NoSQL scale.</span>`},
{cat:"Engine",q:"Describe all 3 Database Engine components with their sub-components.",a:`The lecture: "A database system is partitioned into modules that deal with each of the responsibilities of the overall system."
<strong>1. Storage Manager:</strong> Interface between low-level disk data and applications/queries. Responsible for OS file manager interaction and efficient storing/retrieving/updating.
<span class="ap">Four sub-components: (1) Authorization &amp; Integrity Manager — tests constraints, checks access rights. (2) Transaction Manager — ensures ACID, manages undo/redo logs. (3) File Manager — disk space allocation. (4) Buffer Manager — RAM cache (buffer pool), hot page management.</span>
<span class="ap">Three data structures: Data Files (actual records), Data Dictionary (metadata/schema), Indices (fast access pointers).</span>
<strong>2. Query Processor Component:</strong>
<span class="ap">DDL Interpreter — interprets CREATE/ALTER/DROP statements, records in data dictionary.</span>
<span class="ap">DML Compiler — translates SELECT/INSERT/UPDATE/DELETE into evaluation plans, performs query optimization (lowest cost plan selection).</span>
<span class="ap">Query Evaluation Engine — executes the low-level instructions, returns result relation.</span>
<strong>3. Transaction Management Component:</strong> Ensures DB remains consistent despite system failures and concurrent access. The Concurrency-Control Manager controls interaction among concurrent transactions to ensure consistency.`},
{cat:"Transactions",q:"What is a transaction and how does the Lost Update Problem demonstrate why transaction management is essential?",a:`<strong>Definition:</strong> A transaction is a collection of operations that performs a single logical function. Example: "Transfer ₩100,000 from Account A to Account B" = one transaction with two operations: (1) debit A, (2) credit B.
<strong>The Lost Update Problem (demonstrates need for Isolation):</strong>
<span class="ap">Time 1: Teller A reads Account X balance = ₩100,000</span>
<span class="ap">Time 2: Teller B reads Account X balance = ₩100,000 (same time!)</span>
<span class="ap">Time 3: Teller A withdraws ₩50,000 → computes ₩50,000 → writes ₩50,000</span>
<span class="ap">Time 4: Teller B withdraws ₩50,000 → computes ₩50,000 → OVERWRITES with ₩50,000</span>
<span class="ap">Result: Balance shows ₩50,000 but should be ₩0! Teller A's withdrawal was "lost"!</span>
<strong>The Solution:</strong> The Concurrency-Control Manager uses locking or MVCC to ensure Teller B cannot read Account X until Teller A's transaction fully commits. The Transaction-Management Component ensures the database remains in a consistent (correct) state despite system failures and concurrent access.`},
{cat:"Independence",q:"What is Physical Data Independence and why is it critically important?",a:`<strong>Exact lecture definition:</strong> Physical Data Independence — the ability to modify the physical schema without changing the logical schema.
Lecture: "The interfaces between the various levels and components should be well defined so that changes in some parts do not seriously influence others."
<strong>Why it's critically important:</strong>
<span class="ap"><strong>Performance tuning without code changes:</strong> A DBA can add a B+-tree index on a frequently-queried column. This changes the physical schema but application queries automatically run faster — developers write zero new code.</span>
<span class="ap"><strong>Hardware migration:</strong> Migrate from HDDs to NVMe SSDs, or from on-premise to Amazon RDS cloud. Application code unchanged — Netflix did exactly this.</span>
<span class="ap"><strong>Independent evolution:</strong> Storage engineers and application developers work independently. Storage team optimises physical layer while app team adds new features.</span>
<em>Without physical data independence, every hardware upgrade would require rewriting all applications — economically catastrophic.</em>`},
{cat:"Relational Model",q:"What is the Relational Model? Explain all key concepts: relation, tuple, attribute, primary key, foreign key.",a:`<strong>Relational Model</strong> (Ted Codd, 1970): All data is stored in tables (relations). The model organises all data into simple two-dimensional tables and uses set-based SQL operations to query them. Ted Codd received the ACM Turing Award 1981 for this work.
<strong>Key Concepts:</strong>
<span class="ap"><strong>Relation (Table):</strong> A named two-dimensional structure with a fixed set of columns. Example: the "instructor" table.</span>
<span class="ap"><strong>Tuple (Row/Record):</strong> A single row in a table representing one entity. Example: (10101, 'Srinivasan', 'Comp. Sci.', 65000).</span>
<span class="ap"><strong>Attribute (Column):</strong> A named property with a specified data type. Example: ID char(5), name varchar(20), salary numeric(8,2).</span>
<span class="ap"><strong>Primary Key (PK):</strong> An attribute that uniquely identifies each row. Cannot be NULL or duplicate. Example: ID in instructor table.</span>
<span class="ap"><strong>Foreign Key (FK):</strong> An attribute whose value must match a value in another table's primary key. Links tables together. Example: dept_name in instructor must match dept_name in department. This enforces referential integrity.</span>`},
{cat:"Summary",q:"What are the top exam topics and key definitions to memorise for Chapter 1?",a:`<span class="ap"><strong>1. ACID Properties:</strong> Atomicity (all-or-nothing) · Consistency (valid state always) · Isolation (no interference between concurrent transactions) · Durability (committed = permanent). Know each with a bank transfer example.</span>
<span class="ap"><strong>2. Three Abstraction Levels:</strong> Physical (HOW stored) → Logical (WHAT stored, where programmers work) → View (user-specific, security). Know what each level hides.</span>
<span class="ap"><strong>3. Relational Model:</strong> Ted Codd, 1970, ACM Turing Award 1981. Data in tables (relations), rows (tuples), columns (attributes), linked by foreign keys.</span>
<span class="ap"><strong>4. Physical Data Independence:</strong> Ability to modify physical schema without changing logical schema or apps. Lecture quote about interfaces being well-defined.</span>
<span class="ap"><strong>5. Query Optimization:</strong> DML Compiler picks LOWEST COST plan. Two equivalent queries can differ 1,000×. Uses data dictionary statistics.</span>
<span class="ap"><strong>6. Three-Tier Architecture:</strong> Client (no direct DB) → App Server (business logic, forms interface) → DB Server. Why: security, scalability, maintainability.</span>
<span class="ap"><strong>7. 7 File System Problems → All Solved by DBMS</strong></span>
<span class="ap"><strong>8. Storage Manager:</strong> 4 components (Auth&amp;Integrity, Transaction, File, Buffer Managers) + 3 data structures (Data Files, Data Dictionary, Indices).</span>
<span class="ap"><strong>9. Procedural vs Declarative DML:</strong> Procedural = WHAT+HOW. Declarative (SQL) = WHAT only. "Declarative is easier to learn and use."</span>
<span class="ap"><strong>10. University DB Application Programs:</strong> Add students/instructors/courses · Register for courses · Compute GPA and generate transcripts.</span>`}
];
