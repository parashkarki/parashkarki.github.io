<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Advanced Tic-Tac-Toe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .glow-text:hover {
            transform: scale(1.05);
        }

        .cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .cell:hover:not(.taken) {
            background: rgba(255, 255, 255, 0.05);
        }

        .cell.taken {
            cursor: default;
        }

        .x-mark {
            color: #818cf8;
            text-shadow: 0 0 15px rgba(129, 140, 248, 0.8);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .o-mark {
            color: #2dd4bf;
            text-shadow: 0 0 15px rgba(45, 212, 191, 0.8);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .view-container {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .view-container.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .winning-cell {
            background: rgba(255, 255, 255, 0.1) !important;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .mode-btn {
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .mode-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Landing View -->
    <div id="landingView" class="view-container active flex-col items-center max-w-4xl w-full text-center">
        <div class="inline-block px-4 py-1.5 mb-6 text-sm font-semibold tracking-wider text-indigo-400 uppercase glass rounded-full">
            Something New is Brewing
        </div>
        <h1 onclick="showModeSelection()" class="text-6xl md:text-8xl font-extrabold mb-8 glow-text tracking-tighter">
            Coming <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">Soon</span>
        </h1>
        <p class="text-gray-400 text-lg md:text-xl max-w-xl mx-auto leading-relaxed">
            We are hard at work. Click the text above to play a game.
        </p>
    </div>

    <!-- Mode Selection View -->
    <div id="modeView" class="view-container flex-col items-center w-full max-w-md text-center">
        <h2 class="text-3xl font-bold mb-8">Choose Game Mode</h2>
        <div class="flex flex-col gap-4 w-full">
            <button onclick="startGame('pvp')" class="mode-btn glass p-6 rounded-2xl flex items-center justify-center gap-4 group">
                <span class="text-2xl">👥</span>
                <span class="text-xl font-semibold">Play with Friend</span>
            </button>
            <button onclick="startGame('pvc')" class="mode-btn glass p-6 rounded-2xl flex items-center justify-center gap-4 group">
                <span class="text-2xl">🤖</span>
                <span class="text-xl font-semibold">Play with Computer</span>
            </button>
        </div>
        <button onclick="showLanding()" class="mt-8 text-gray-500 hover:text-white transition-colors">Go Back</button>
    </div>

    <!-- Game View -->
    <div id="gameView" class="view-container flex-col items-center w-full max-w-md">
        <div class="w-full flex justify-between items-center mb-6">
            <button onclick="showModeSelection()" class="text-gray-400 hover:text-white flex items-center gap-2 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                Modes
            </button>
            <div id="status" class="text-lg font-bold text-indigo-400 uppercase tracking-widest">X's Turn</div>
            <div class="w-10"></div> <!-- Spacer -->
        </div>

        <div class="glass p-4 rounded-3xl w-full">
            <div id="grid" class="grid grid-cols-3 gap-3"></div>
        </div>
    </div>

    <!-- Results Overlay -->
    <div id="resultsOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="glass p-12 rounded-[40px] text-center max-w-xs w-full mx-4 border-indigo-500/30">
            <h2 id="resultTitle" class="text-4xl font-extrabold mb-2 text-white">Winner!</h2>
            <p id="resultSub" class="text-indigo-400 text-xl font-bold mb-8">Player X</p>
            <button onclick="resetGame()" class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:bg-indigo-100 transition-colors shadow-lg shadow-indigo-500/20">
                Play Again
            </button>
            <button onclick="showLanding()" class="mt-4 text-gray-500 hover:text-white text-sm">Exit Game</button>
        </div>
    </div>

    <script>
        const views = {
            landing: document.getElementById('landingView'),
            mode: document.getElementById('modeView'),
            game: document.getElementById('gameView'),
            results: document.getElementById('resultsOverlay')
        };
        const grid = document.getElementById('grid');
        const statusEl = document.getElementById('status');
        const resultTitle = document.getElementById('resultTitle');
        const resultSub = document.getElementById('resultSub');

        let currentPlayer = 'X';
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let gameActive = false;
        let gameMode = 'pvp'; // 'pvp' or 'pvc'

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function switchView(viewName) {
            Object.values(views).forEach(v => {
                v.classList.remove('active');
                if(v === views.results) v.classList.add('hidden');
            });
            views[viewName].classList.add('active');
        }

        function showLanding() { switchView('landing'); }
        function showModeSelection() { switchView('mode'); }

        function startGame(mode) {
            gameMode = mode;
            switchView('game');
            resetGame();
        }

        function initGrid() {
            grid.innerHTML = '';
            gameState.forEach((cell, index) => {
                const cellEl = document.createElement('div');
                cellEl.classList.add('cell', 'glass', 'rounded-2xl');
                cellEl.setAttribute('data-index', index);
                cellEl.addEventListener('click', () => handleCellClick(index));
                grid.appendChild(cellEl);
            });
        }

        function handleCellClick(index) {
            if (gameState[index] !== "" || !gameActive || (gameMode === 'pvc' && currentPlayer === 'O')) return;
            makeMove(index);
        }

        function makeMove(index) {
            gameState[index] = currentPlayer;
            const cell = grid.children[index];
            cell.classList.add('taken');
            
            const span = document.createElement('span');
            span.innerText = currentPlayer;
            span.classList.add(currentPlayer === 'X' ? 'x-mark' : 'o-mark');
            cell.appendChild(span);

            if (checkResult()) return;

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusEl.innerText = `${currentPlayer}'s Turn`;
            statusEl.style.color = currentPlayer === 'X' ? '#818cf8' : '#2dd4bf';

            if (gameMode === 'pvc' && currentPlayer === 'O' && gameActive) {
                setTimeout(computerMove, 600);
            }
        }

        function computerMove() {
            const emptyIndices = gameState.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (emptyIndices.length === 0 || !gameActive) return;
            
            // Basic AI: Try to win, then block, then random
            let move = findBestMove('O') || findBestMove('X') || emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
            makeMove(move);
        }

        function findBestMove(player) {
            for (let cond of winningConditions) {
                const [a, b, c] = cond;
                const vals = [gameState[a], gameState[b], gameState[c]];
                if (vals.filter(v => v === player).length === 2 && vals.filter(v => v === "").length === 1) {
                    return cond[vals.indexOf("")];
                }
            }
            return null;
        }

        function checkResult() {
            let roundWon = false;
            let winningLine = [];

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    roundWon = true;
                    winningLine = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                highlightWinner(winningLine);
                showEndScreen(`Winner!`, `Player ${currentPlayer}`);
                gameActive = false;
                return true;
            }

            if (!gameState.includes("")) {
                showEndScreen(`Draw`, `Great Game!`);
                gameActive = false;
                return true;
            }
            return false;
        }

        function highlightWinner(line) {
            line.forEach(index => grid.children[index].classList.add('winning-cell'));
        }

        function showEndScreen(title, sub) {
            resultTitle.innerText = title;
            resultSub.innerText = sub;
            resultSub.style.color = currentPlayer === 'X' ? '#818cf8' : '#2dd4bf';
            if(title === 'Draw') resultSub.style.color = '#94a3b8';
            
            views.results.classList.remove('hidden');
            setTimeout(() => views.results.classList.add('opacity-100'), 50);
        }

        function resetGame() {
            currentPlayer = 'X';
            gameState = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            statusEl.innerText = `X's Turn`;
            statusEl.style.color = '#818cf8';
            views.results.classList.remove('opacity-100');
            setTimeout(() => views.results.classList.add('hidden'), 300);
            initGrid();
        }
    </script>
</body>
</html>
