<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomizer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #E2E8F0;
            border-radius: 10px;
        }

        .animate-pop {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #toast {
            transition: all 0.3s ease;
            transform: translateY(100px);
            opacity: 0;
        }
        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="text-slate-900">

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 bg-indigo-600 text-white px-6 py-3 rounded-full shadow-2xl font-bold text-sm pointer-events-none">
        Copied to clipboard!
    </div>

    <div class="min-h-screen p-4 md:p-8">
        <!-- Header -->
        <header class="max-w-5xl mx-auto flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight flex items-center gap-3">
                    <i class="fa-solid fa-dice-five text-indigo-600"></i>
                    RANDOM<span class="text-indigo-600">PRO</span>
                </h1>
                <p class="text-slate-500 text-sm font-medium">Professional Decision & Probability Suite</p>
            </div>
            <div id="auth-status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-white px-3 py-1 rounded-full border border-slate-100">
                Connecting...
            </div>
        </header>

        <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar Navigation -->
            <nav class="lg:col-span-3 flex flex-row lg:flex-col gap-2 overflow-x-auto pb-4 lg:pb-0 custom-scrollbar">
                <button onclick="switchTab('numbers')" class="tab-btn active flex items-center gap-3 px-5 py-3 rounded-2xl font-bold text-sm transition-all whitespace-nowrap bg-indigo-600 text-white shadow-lg shadow-indigo-100" data-tab="numbers">
                    <i class="fa-solid fa-hashtag w-5"></i> Numbers
                </button>
                <button onclick="switchTab('lists')" class="tab-btn flex items-center gap-3 px-5 py-3 rounded-2xl font-bold text-sm transition-all whitespace-nowrap bg-white text-slate-500 hover:bg-slate-50 border border-slate-100" data-tab="lists">
                    <i class="fa-solid fa-list-ol w-5"></i> Pick Lists
                </button>
                <button onclick="switchTab('groups')" class="tab-btn flex items-center gap-3 px-5 py-3 rounded-2xl font-bold text-sm transition-all whitespace-nowrap bg-white text-slate-500 hover:bg-slate-50 border border-slate-100" data-tab="groups">
                    <i class="fa-solid fa-users w-5"></i> Team Maker
                </button>
                <button onclick="switchTab('weighted')" class="tab-btn flex items-center gap-3 px-5 py-3 rounded-2xl font-bold text-sm transition-all whitespace-nowrap bg-white text-slate-500 hover:bg-slate-50 border border-slate-100" data-tab="weighted">
                    <i class="fa-solid fa-scale-balanced w-5"></i> Probability
                </button>
                <button onclick="switchTab('security')" class="tab-btn flex items-center gap-3 px-5 py-3 rounded-2xl font-bold text-sm transition-all whitespace-nowrap bg-white text-slate-500 hover:bg-slate-50 border border-slate-100" data-tab="security">
                    <i class="fa-solid fa-shield-halved w-5"></i> Security
                </button>
            </nav>

            <!-- Main Content -->
            <section class="lg:col-span-6 bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden min-h-[550px]">
                <div class="p-6 md:p-8">
                    
                    <!-- Numbers Tab -->
                    <div id="tab-numbers" class="tab-content active animate-pop">
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="space-y-1.5">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Min Value</label>
                                <input id="num-min" type="number" value="1" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-sm">
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Max Value</label>
                                <input id="num-max" type="number" value="100" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-sm">
                            </div>
                        </div>
                        <button onclick="generateNumber()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-lg hover:bg-indigo-700 transition-all active:scale-95 shadow-xl shadow-indigo-100 mb-8">
                            GENERATE
                        </button>
                        <div class="flex flex-col items-center justify-center min-h-[180px] bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200">
                            <div id="num-result" class="text-7xl font-black text-indigo-600 tabular-nums">--</div>
                            <div class="text-xs font-bold text-slate-400 mt-2 uppercase tracking-tighter">Resulting Outcome</div>
                        </div>
                    </div>

                    <!-- Lists Tab -->
                    <div id="tab-lists" class="tab-content animate-pop">
                        <div class="space-y-2 mb-6">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex justify-between">
                                Entry List 
                                <span class="text-indigo-400 italic font-medium">Commas or New Lines</span>
                            </label>
                            <textarea id="list-input" placeholder="Pizza, Burger, Sushi..." class="w-full h-40 p-4 bg-slate-50 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium text-sm transition-all"></textarea>
                        </div>
                        <div class="flex items-end gap-4 mb-6">
                            <div class="flex-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Pick Amount</label>
                                <input id="list-count" type="number" value="1" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-sm">
                            </div>
                            <button onclick="saveListTemplate()" class="p-3 bg-white text-slate-400 border border-slate-200 rounded-xl hover:text-indigo-600 hover:border-indigo-200 transition-all"><i class="fa-solid fa-floppy-disk text-xl"></i></button>
                        </div>
                        <button onclick="pickFromList()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-lg hover:bg-indigo-700 shadow-xl shadow-indigo-100 mb-6">PICK RANDOM</button>
                        <div id="list-results" class="space-y-2"></div>
                    </div>

                    <!-- Groups Tab -->
                    <div id="tab-groups" class="tab-content animate-pop">
                        <textarea id="group-input" placeholder="Member names separated by commas..." class="w-full h-32 p-4 bg-slate-50 rounded-2xl border border-slate-200 focus:outline-none font-medium text-sm mb-6"></textarea>
                        <div class="flex gap-4 mb-6">
                            <div class="flex-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Number of Teams</label>
                                <input id="group-count" type="number" value="2" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-sm">
                            </div>
                            <button onclick="copyGroups()" class="px-4 bg-white border border-slate-200 rounded-xl text-slate-400 hover:text-indigo-600 transition-all"><i class="fa-solid fa-copy"></i></button>
                        </div>
                        <button onclick="generateGroups()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-lg mb-6">CREATE TEAMS</button>
                        <div id="group-results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>

                    <!-- Weighted Tab -->
                    <div id="tab-weighted" class="tab-content animate-pop">
                        <div id="weighted-items" class="space-y-3 mb-6"></div>
                        <button onclick="addWeightedItem()" class="flex items-center gap-2 text-[10px] font-black uppercase tracking-wider text-indigo-600 hover:text-indigo-800 p-2 mb-6">
                            <i class="fa-solid fa-plus"></i> Add New Possibility
                        </button>
                        <button onclick="rollWeighted()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-lg mb-6 shadow-xl shadow-indigo-100">CALCULATE PROBABILITY</button>
                        <div id="weighted-winner"></div>
                    </div>

                    <!-- Security Tab -->
                    <div id="tab-security" class="tab-content animate-pop">
                        <div class="p-4 bg-slate-900 rounded-2xl text-white mb-6">
                            <h4 class="text-xs font-black uppercase tracking-widest text-indigo-400 mb-1">Security Vault</h4>
                            <p class="text-[11px] text-slate-400 leading-relaxed font-medium">Generate industrial-strength random strings.</p>
                        </div>
                        <div class="space-y-1.5 mb-6">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">String Length</label>
                            <input id="pass-length" type="number" value="24" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-sm">
                        </div>
                        <button onclick="generatePassword()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-lg mb-6">GENERATE KEY</button>
                        <div class="relative group">
                            <div id="pass-result" class="w-full p-5 bg-slate-50 rounded-2xl border border-slate-200 font-mono text-xs break-all pr-12 min-h-[64px] flex items-center shadow-inner text-slate-400 italic">
                                No key generated...
                            </div>
                            <button onclick="copyPassword()" class="absolute right-3 top-1/2 -translate-y-1/2 p-2 bg-white shadow-md border border-slate-200 rounded-xl text-slate-400 hover:text-indigo-600">
                                <i class="fa-solid fa-copy"></i>
                            </button>
                        </div>
                    </div>

                </div>
            </section>

            <!-- Right Column -->
            <aside class="lg:col-span-3 space-y-6">
                <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center justify-between">
                        Recent Activity <i class="fa-solid fa-rotate-left cursor-pointer hover:text-indigo-500" onclick="clearHistory()"></i>
                    </h3>
                    <div id="history-list" class="space-y-3">
                        <p class="text-xs text-slate-400 italic">No activity yet...</p>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">
                        Cloud Presets
                    </h3>
                    <div id="presets-list" class="space-y-2 max-h-[300px] overflow-y-auto custom-scrollbar">
                        <p class="text-xs text-slate-400 italic">Connecting to cloud...</p>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State
        let db, auth, user, currentAppId;
        const COLORS = ['#6366f1', '#f43f5e', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4', '#ec4899'];
        let weightedItems = [
            { id: 1, name: 'Legendary Pick', weight: 5 },
            { id: 2, name: 'Standard Pick', weight: 95 }
        ];

        // --- Init App ---
        window.onload = async () => {
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'randomizer-pro-html';

            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };

            await initAuth();
            
            onAuthStateChanged(auth, (u) => {
                user = u;
                document.getElementById('auth-status').innerText = u ? `User: ${u.uid.substring(0,8)}` : 'Guest Mode';
                if (u) listenToPresets();
            });

            renderWeightedItems();
        };

        // --- Core Utils ---
        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('bg-indigo-600', btn.dataset.tab === tabId);
                btn.classList.toggle('text-white', btn.dataset.tab === tabId);
                btn.classList.toggle('bg-white', btn.dataset.tab !== tabId);
                btn.classList.toggle('text-slate-500', btn.dataset.tab !== tabId);
                btn.classList.toggle('shadow-lg', btn.dataset.tab === tabId);
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.id === `tab-${tabId}`);
            });
        };

        const showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        };

        const addToHistory = (label, value) => {
            const list = document.getElementById('history-list');
            if (list.querySelector('p.italic')) list.innerHTML = '';
            
            const div = document.createElement('div');
            div.className = 'flex justify-between items-center p-2 rounded-lg bg-slate-50 border border-slate-100 animate-pop';
            div.innerHTML = `
                <span class="text-[10px] font-mono text-slate-500 truncate max-w-[100px]">${label}</span>
                <span class="text-sm font-bold text-indigo-600">${value}</span>
            `;
            list.prepend(div);
            if (list.children.length > 10) list.lastChild.remove();
        };

        window.clearHistory = () => {
            document.getElementById('history-list').innerHTML = '<p class="text-xs text-slate-400 italic">No activity yet...</p>';
        };

        const parseItems = (text) => {
            if (!text) return [];
            return text.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
        };

        // --- Number Generator ---
        window.generateNumber = () => {
            const min = +document.getElementById('num-min').value;
            const max = +document.getElementById('num-max').value;
            const res = Math.floor(Math.random() * (max - min + 1)) + min;
            document.getElementById('num-result').innerText = res;
            addToHistory(`${min}-${max}`, res);
        };

        // --- List Picker ---
        window.pickFromList = () => {
            const text = document.getElementById('list-input').value;
            const count = +document.getElementById('list-count').value;
            const items = parseItems(text);
            if (!items.length) return;

            const shuffled = [...items].sort(() => 0.5 - Math.random());
            const winners = shuffled.slice(0, count);

            const container = document.getElementById('list-results');
            container.innerHTML = winners.map((w, i) => `
                <div class="flex items-center justify-between p-4 bg-indigo-50 border border-indigo-100 rounded-xl animate-pop">
                    <span class="font-bold text-indigo-900">${w}</span>
                    <span class="text-[9px] font-black text-indigo-300 uppercase">Selected</span>
                </div>
            `).join('');
            addToHistory('List Pick', winners[0] + (winners.length > 1 ? '...' : ''));
        };

        // --- Team Maker ---
        window.generateGroups = () => {
            const text = document.getElementById('group-input').value;
            const numGroups = +document.getElementById('group-count').value;
            const items = parseItems(text);
            if (!items.length || items.length < numGroups) return;

            items.sort(() => 0.5 - Math.random());
            const groups = Array.from({ length: numGroups }, () => []);
            items.forEach((item, i) => groups[i % numGroups].push(item));

            const container = document.getElementById('group-results');
            container.innerHTML = groups.map((g, i) => `
                <div class="bg-white border-t-4 p-4 rounded-2xl shadow-sm border-slate-100 group" style="border-top-color: ${COLORS[i % COLORS.length]}">
                    <h4 class="font-black text-sm mb-3 flex justify-between">Team ${i+1} <span class="text-slate-300 text-[10px]">${g.length}</span></h4>
                    <div class="space-y-1">
                        ${g.map(m => `<div class="text-[11px] font-semibold bg-slate-50 p-2 rounded-lg text-slate-600">${m}</div>`).join('')}
                    </div>
                </div>
            `).join('');
            addToHistory('Groups', `${numGroups} Teams`);
        };

        window.copyGroups = () => {
            const container = document.getElementById('group-results');
            if (!container.children.length) return;
            let text = "";
            Array.from(container.children).forEach((child, i) => {
                const names = Array.from(child.querySelectorAll('.text-slate-600')).map(el => el.innerText);
                text += `Team ${i+1}: ${names.join(', ')}\n`;
            });
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast("Teams copied!");
        };

        // --- Weighted ---
        window.renderWeightedItems = () => {
            const container = document.getElementById('weighted-items');
            container.innerHTML = weightedItems.map((it, idx) => `
                <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <input value="${it.name}" onchange="updateWeighted(${idx}, 'name', this.value)" class="flex-1 bg-transparent font-bold text-sm focus:outline-none" placeholder="Item Name">
                    <div class="w-24 bg-white border border-slate-200 rounded-lg px-2 flex items-center">
                        <span class="text-[9px] font-black text-slate-300 mr-1">WGT</span>
                        <input type="number" value="${it.weight}" onchange="updateWeighted(${idx}, 'weight', this.value)" class="w-full py-1 text-center font-mono text-xs font-bold focus:outline-none">
                    </div>
                    <button onclick="removeWeighted(${idx})" class="text-slate-300 hover:text-rose-500"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        };

        window.updateWeighted = (idx, key, val) => {
            weightedItems[idx][key] = key === 'weight' ? +val : val;
        };

        window.addWeightedItem = () => {
            weightedItems.push({ id: Date.now(), name: '', weight: 10 });
            renderWeightedItems();
        };

        window.removeWeighted = (idx) => {
            weightedItems.splice(idx, 1);
            renderWeightedItems();
        };

        window.rollWeighted = () => {
            const total = weightedItems.reduce((s, i) => s + i.weight, 0);
            let r = Math.random() * total, acc = 0;
            let winner = weightedItems[0];
            for (const it of weightedItems) {
                acc += it.weight;
                if (r <= acc) { winner = it; break; }
            }

            const container = document.getElementById('weighted-winner');
            container.innerHTML = `
                <div class="p-8 bg-indigo-900 text-white rounded-3xl text-center animate-pop relative overflow-hidden">
                    <div class="text-indigo-300 text-[10px] font-black uppercase tracking-widest mb-2">Calculated Outcome</div>
                    <div class="text-3xl font-black text-white">${winner.name || 'Unnamed Item'}</div>
                    <div class="text-xs font-bold text-indigo-400 mt-2">Weight Strength: ${winner.weight}</div>
                </div>
            `;
            addToHistory('Probability', winner.name || 'Item');
        };

        // --- Security ---
        window.generatePassword = () => {
            const len = +document.getElementById('pass-length').value;
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?";
            let res = "";
            for(let i=0; i<len; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            const el = document.getElementById('pass-result');
            el.innerText = res;
            el.classList.remove('text-slate-400', 'italic');
            el.classList.add('text-slate-900');
        };

        window.copyPassword = () => {
            const val = document.getElementById('pass-result').innerText;
            if (val.includes('No key')) return;
            const textarea = document.createElement('textarea');
            textarea.value = val;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast("Key copied!");
        };

        // --- Cloud Storage ---
        const listenToPresets = () => {
            if (!user) return;
            const q = query(collection(db, 'artifacts', currentAppId, 'users', user.uid, 'templates'));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('presets-list');
                if (snapshot.empty) {
                    list.innerHTML = '<p class="text-xs text-slate-400 italic">No presets saved.</p>';
                    return;
                }
                list.innerHTML = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return `
                        <div class="group flex justify-between items-center p-2 rounded-lg hover:bg-indigo-50 transition-colors cursor-pointer border border-transparent hover:border-indigo-100" onclick="loadPreset('${doc.id}', '${btoa(data.data)}')">
                            <div class="flex flex-col overflow-hidden">
                                <span class="text-xs font-bold text-slate-700 truncate">${data.name}</span>
                                <span class="text-[10px] text-slate-400 uppercase">List</span>
                            </div>
                            <button onclick="event.stopPropagation(); deletePreset('${doc.id}')" class="opacity-0 group-hover:opacity-100 text-rose-400 hover:text-rose-600 transition-opacity ml-2">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>
                        </div>
                    `;
                }).join('');
            });
        };

        window.saveListTemplate = async () => {
            const text = document.getElementById('list-input').value;
            if (!text || !user) return;
            const name = prompt("Enter preset name:");
            if (!name) return;
            
            try {
                await addDoc(collection(db, 'artifacts', currentAppId, 'users', user.uid, 'templates'), {
                    name,
                    data: text,
                    type: 'list',
                    createdAt: Date.now()
                });
                showToast("Preset saved!");
            } catch (e) { showToast("Error saving"); }
        };

        window.loadPreset = (id, base64Data) => {
            const data = atob(base64Data);
            document.getElementById('list-input').value = data;
            switchTab('lists');
            showToast("Preset loaded");
        };

        window.deletePreset = async (id) => {
            if (!user) return;
            await deleteDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'templates', id));
            showToast("Preset deleted");
        };

    </script>
</body>
</html>
