<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title id="pageTitle">Grade Access Approval Line · AI &amp; Big Data Dept.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0E14;
    --bg-soft:#0D1219;
    --surface:#141B24;
    --surface-2:#1B2530;
    --border:#26303B;
    --border-soft:#1E2730;
    --text:#F2EDE0;
    --text-dim:#9AA5B3;
    --text-faint:#5C6A78;
    --seal:#C0392B;
    --seal-dim:#5A2723;
    --seal-glow:rgba(192,57,43,0.30);
    --gold:#C9A33D;
    --gold-dim:rgba(201,163,61,0.16);
    --success:#4FAE7A;
    --success-bg:rgba(79,174,122,0.12);
    --success-border:rgba(79,174,122,0.35);
    --warn:#D98E3F;
    --warn-bg:rgba(217,142,63,0.10);
    --warn-border:rgba(217,142,63,0.30);
    --radius:18px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1100px 600px at 50% -10%, rgba(192,57,43,0.07), transparent 60%),
      radial-gradient(900px 500px at 90% 10%, rgba(201,163,61,0.05), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Inter','Noto Sans KR',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }

  .kr{font-family:'Noto Sans KR','Inter',sans-serif;}
  .serif-kr{font-family:'Noto Serif KR',serif;}

  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:28px 20px 60px;
  }

  /* ---------- Top bar / language toggle ---------- */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:6px;
    position:relative;
    z-index:1001;
  }
  .icon-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:36px; height:36px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:50%;
    color:var(--text-dim);
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .1s ease, color .15s ease;
  }
  .icon-btn:hover{border-color:var(--gold); background:var(--surface-2); color:var(--gold);}
  .icon-btn:active{transform:scale(0.93);}
  .icon-btn:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
  .lang-toggle{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:999px;
    padding:7px 13px 7px 11px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:700;
    letter-spacing:0.03em;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .lang-toggle:hover{border-color:var(--gold); background:var(--surface-2);}
  .lang-toggle:active{transform:scale(0.96);}
  .lang-toggle .globe{font-size:15px; line-height:1;}
  .lang-toggle .langcode{color:var(--gold);}
  .lang-toggle .sep{color:var(--text-faint); font-weight:400;}
  .lang-toggle:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}

  /* ---------- Disclaimer overlay ---------- */
  .disclaimer-overlay{
    position:fixed;
    inset:0;
    background:rgba(5,7,10,0.78);
    backdrop-filter:blur(3px);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:1000;
  }
  .disclaimer-overlay.show{display:flex; animation:fadeIn .2s ease both;}
  @keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
  .disclaimer-modal{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    max-width:420px;
    width:100%;
    max-height:88vh;
    overflow-y:auto;
    padding:22px 20px 20px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.7);
    animation:popIn .3s cubic-bezier(.2,.9,.25,1) both;
  }
  .notice-tag{
    display:inline-block;
    font-family:'Inter',sans-serif;
    font-size:10px;
    font-weight:800;
    letter-spacing:0.14em;
    color:var(--seal);
    border:1.5px solid var(--seal);
    border-radius:6px;
    padding:2px 8px;
    margin-bottom:11px;
  }
  .disc-title{
    font-family:'Noto Serif KR',serif;
    font-weight:700;
    font-size:18px;
    color:var(--text);
    margin-bottom:12px;
    line-height:1.35;
  }
  .disc-body{
    font-size:12.5px;
    line-height:1.55;
    color:var(--text-dim);
  }
  .disc-body p{margin:0 0 10px;}
  .disc-body p:last-child{margin-bottom:0;}
  .disc-body b{color:var(--text); font-weight:700;}
  .disc-btn{
    margin-top:15px;
    width:100%;
    background:var(--seal);
    color:#FBEDEA;
    border:none;
    border-radius:13px;
    padding:12px 0;
    font-family:'Noto Sans KR',sans-serif;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    transition:filter .15s ease, transform .1s ease;
  }
  .disc-btn:hover{filter:brightness(1.08);}
  .disc-btn:active{transform:scale(0.98);}
  .disc-btn:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}

  /* ---------- Header ---------- */
  header{
    text-align:center;
    margin-bottom:28px;
  }
  .eyebrow{
    font-family:'Inter',sans-serif;
    font-size:11.5px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:700;
    margin-bottom:10px;
    opacity:0.9;
  }
  h1{
    font-family:'Noto Serif KR',serif;
    font-weight:700;
    font-size:26px;
    line-height:1.35;
    margin:0 0 12px;
    color:var(--text);
    letter-spacing:-0.01em;
  }
  h1 .en{
    display:block;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:500;
    color:var(--text-faint);
    margin-top:6px;
    letter-spacing:0.01em;
  }
  .lede{
    font-size:14px;
    color:var(--text-dim);
    max-width:420px;
    margin:0 auto;
  }
  .lede b{color:var(--text);font-weight:700;}
  .lede .en{
    display:block;
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    color:var(--text-faint);
    margin-top:6px;
  }

  /* ---------- Search ---------- */
  .search-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px;
    box-shadow:0 1px 0 rgba(255,255,255,0.02) inset, 0 20px 40px -24px rgba(0,0,0,0.6);
  }
  .search-row{
    display:flex;
    gap:10px;
  }
  #sid{
    flex:1;
    min-width:0;
    background:var(--bg-soft);
    border:1.5px solid var(--border);
    border-radius:13px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:18px;
    font-weight:600;
    letter-spacing:0.04em;
    padding:14px 14px;
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
    -webkit-appearance:none;
  }
  #sid::placeholder{
    color:var(--text-faint);
    font-weight:500;
    letter-spacing:0;
  }
  #sid:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 3px var(--gold-dim);
  }
  #go{
    flex:0 0 auto;
    background:var(--seal);
    color:#FBEDEA;
    border:none;
    border-radius:13px;
    padding:0 20px;
    font-family:'Noto Sans KR',sans-serif;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    transition:filter .15s ease, transform .1s ease;
  }
  #go:hover{filter:brightness(1.08);}
  #go:active{transform:scale(0.97);}
  #go:focus-visible, #sid:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}

  .hint{
    margin-top:10px;
    font-size:12.5px;
    color:var(--text-faint);
    min-height:16px;
  }
  .hint.error{color:var(--seal); font-weight:600;}

  /* ---------- Results ---------- */
  #results{
    margin-top:26px;
    display:none;
  }
  #results.show{display:block; animation:fadeUp .35s ease both;}
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }

  .sid-label{
    text-align:center;
    font-size:12.5px;
    color:var(--text-faint);
    margin-bottom:14px;
  }
  .sid-label span{
    font-weight:700;
    color:var(--text);
    font-size:15px;
    letter-spacing:0.03em;
    margin-left:4px;
  }

  .approval-line{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:18px;
  }
  @media (min-width:480px){
    .approval-line{grid-template-columns:repeat(4,1fr);}
  }

  .stamp-box{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px 10px 16px;
    text-align:center;
    position:relative;
    opacity:0;
    transform:translateY(10px) scale(0.96);
    animation:popIn .42s cubic-bezier(.2,.9,.25,1) forwards;
  }
  .stamp-box .ord{
    position:absolute;
    top:8px; left:10px;
    font-size:10px;
    color:var(--text-faint);
    font-weight:700;
    font-family:'Inter',sans-serif;
  }
  @keyframes popIn{
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .seal-circle{
    width:52px; height:52px;
    margin:14px auto 10px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    border:2px dashed var(--border);
    color:var(--text-faint);
    font-size:22px;
    transition:all .2s ease;
  }
  .stamp-box.done .seal-circle{
    border:2.5px solid var(--seal);
    color:var(--seal);
    box-shadow:0 0 0 5px var(--seal-glow);
    background:rgba(192,57,43,0.08);
    transform:rotate(-8deg);
  }
  .stamp-box.done .seal-circle svg{filter:drop-shadow(0 0 1px var(--seal));}
  .stamp-name{
    font-family:'Noto Sans KR',sans-serif;
    font-size:12.5px;
    font-weight:700;
    color:var(--text);
    line-height:1.3;
  }
  .stamp-en{
    font-family:'Inter',sans-serif;
    font-size:9.5px;
    color:var(--text-faint);
    margin-top:3px;
    letter-spacing:0.02em;
  }
  .stamp-status{
    margin-top:8px;
    font-size:10.5px;
    font-weight:700;
    letter-spacing:0.03em;
  }
  .stamp-box.done .stamp-status{color:var(--success);}
  .stamp-box:not(.done) .stamp-status{color:var(--text-faint);}

  /* ---------- Verdict banner ---------- */
  .verdict{
    border-radius:16px;
    padding:20px 18px;
    text-align:center;
    opacity:0;
    animation:fadeUp .4s ease .25s both;
  }
  .verdict.ok{
    background:var(--success-bg);
    border:1px solid var(--success-border);
  }
  .verdict.pending{
    background:var(--warn-bg);
    border:1px solid var(--warn-border);
  }
  .verdict.notfound{
    background:var(--surface-2);
    border:1px solid var(--border);
  }
  .verdict .vicon{font-size:30px; line-height:1; margin-bottom:8px;}
  .verdict .vtitle{
    font-family:'Noto Sans KR',sans-serif;
    font-weight:800;
    font-size:17px;
    margin-bottom:6px;
  }
  .verdict.ok .vtitle{color:var(--success);}
  .verdict.pending .vtitle{color:var(--warn);}
  .verdict.notfound .vtitle{color:var(--text);}
  .verdict .vsub{
    font-size:13px;
    color:var(--text-dim);
    margin-bottom:2px;
  }
  .verdict .ven{
    font-family:'Inter',sans-serif;
    font-size:11.5px;
    color:var(--text-faint);
    margin-top:6px;
  }
  .missing-list{
    margin:14px 0 2px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .missing-item{
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border-soft);
    border-radius:10px;
    padding:8px 12px;
    font-size:12.5px;
    color:var(--text);
    text-align:left;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .missing-item::before{
    content:"";
    width:6px;height:6px;border-radius:50%;
    background:var(--warn);
    flex:0 0 auto;
  }

  /* ---------- Stats toggle ---------- */
  .stats-toggle{
    display:block;
    margin:30px auto 0;
    background:none;
    border:none;
    color:var(--text-faint);
    font-family:'Inter',sans-serif;
    font-size:12px;
    text-decoration:underline;
    text-decoration-color:var(--border);
    cursor:pointer;
    text-align:center;
    width:100%;
  }
  .stats-toggle:hover{color:var(--text-dim);}
  #stats{
    display:none;
    margin-top:14px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
  }
  #stats.show{display:block; animation:fadeUp .3s ease both;}
  .stats-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    text-align:center;
  }
  .stat{
    background:var(--bg-soft);
    border:1px solid var(--border-soft);
    border-radius:10px;
    padding:12px 6px;
  }
  .stat .num{
    font-family:'Inter',sans-serif;
    font-size:22px;
    font-weight:800;
    color:var(--gold);
    font-variant-numeric:tabular-nums;
  }
  .stat .lbl{
    font-size:10.5px;
    color:var(--text-faint);
    margin-top:2px;
  }

  footer{
    margin-top:36px;
    text-align:center;
    font-size:11px;
    color:var(--text-faint);
    line-height:1.7;
  }
  footer b{color:var(--text-dim);}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001s !important; transition-duration:0.001s !important;}
  }
</style>
</head>

<div class="wrap">

  <div class="topbar">
    <button class="icon-btn" id="infoToggle" aria-label="About this tool / disclaimer">

  <footer>

</div>

let lang = 'en'; // English is default
let lastSid = null; // remembers last search so we can re-render in the new language

const $ = id => document.getElementById(id);
const sidInput = $('sid');
const goBtn = $('go');
const hint = $('hint');
const results = $('results');
const line = $('line');
const verdict = $('verdict');
const sidEcho = $('sidEcho');
const statsBtn = $('statsBtn');
const statsPanel = $('stats');
const statsGrid = $('statsGrid');
const langToggle = $('langToggle');
const langCode = $('langCode');
const langCodeOther = $('langCodeOther');
const infoToggle = $('infoToggle');
const disclaimerOverlay = $('disclaimerOverlay');
const discTag = $('discTag');
const discTitle = $('discTitle');
const discBody = $('discBody');
const discClose = $('discClose');

function applyStaticText(){
  const t = T[lang];
  document.documentElement.lang = t.htmlLang;
  $('pageTitle').textContent = t.pageTitle;
  $('t-eyebrow').textContent = t.eyebrow;
  $('t-title').textContent = t.title;
  $('t-lede').innerHTML = t.lede;
  sidInput.placeholder = t.placeholder;
  goBtn.textContent = t.searchBtn;
  if(!hint.classList.contains('error')) hint.textContent = t.hintDefault;
  else hint.textContent = t.hintError;
  $('t-sidlabel').childNodes[0].nodeValue = t.resultFor + ' ';
  $('t-footer1').innerHTML = t.footer1;
  $('t-footer2').textContent = t.footer2;
  statsBtn.textContent = statsPanel.classList.contains('show') ? t.statsHide : t.statsShow;
  langCode.textContent = lang.toUpperCase();
  langCodeOther.textContent = (lang === 'en' ? 'ko' : 'en').toUpperCase();
  discTag.textContent = t.discTag;
  discTitle.textContent = t.discTitle;
  discBody.innerHTML = t.discBody;
  discClose.textContent = t.discBtn;
}

function showDisclaimer(){
  disclaimerOverlay.classList.add('show');
  disclaimerOverlay.querySelector('.disclaimer-modal').scrollTop = 0;
  discClose.focus({preventScroll:true});
}
function hideDisclaimer(){
  disclaimerOverlay.classList.remove('show');
  sidInput.focus();
}

function runSearch(){
  const raw = sidInput.value.trim();
  if(!/^\d{9}$/.test(raw)){
    hint.textContent = T[lang].hintError;
    hint.classList.add('error');
    results.classList.remove('show');
    return;
  }
  hint.classList.remove('error');
  hint.textContent = T[lang].hintDefault;

  lastSid = raw;
  const bits = RECORDS[raw];
  sidEcho.textContent = raw;
  renderLine(bits);
  renderVerdict(bits);
  results.classList.add('show');
  results.scrollIntoView({behavior:'smooth', block:'start'});
}

function renderLine(bits){
  const t = T[lang];
  line.innerHTML = '';
  SURVEYS.forEach((s, i) => {
    const done = bits !== undefined && (bits & s.bit) !== 0;
    const box = document.createElement('div');
    box.className = 'stamp-box' + (done ? ' done' : '');
    box.style.animationDelay = (i*90) + 'ms';
    box.innerHTML = `
      <div class="ord">${i+1}</div>
      <div class="seal-circle">${done ? checkSVG : ''}</div>
      <div class="stamp-name">${s[lang]}</div>
      <div class="stamp-en">${lang === 'en' ? s.ko : s.en}</div>
      <div class="stamp-status">${done ? t.statusDone : t.statusPending}</div>
    `;
    line.appendChild(box);
  });
}

function renderVerdict(bits){
  const t = T[lang];
  if(bits === undefined){
    verdict.className = 'verdict notfound';
    verdict.innerHTML = `
      <div class="vicon">🔍</div>
      <div class="vtitle">${t.notFoundTitle}</div>
      <div class="vsub">${t.notFoundSub}</div>
      <div class="ven">${t.notFoundTip}</div>
    `;
    return;
  }

  const missing = SURVEYS.filter(s => (bits & s.bit) === 0);

  if(missing.length === 0){
    verdict.className = 'verdict ok';
    verdict.innerHTML = `
      <div class="vicon">🎉</div>
      <div class="vtitle">${t.okTitle}</div>
      <div class="vsub">${t.okSub}</div>
    `;
  } else {
    verdict.className = 'verdict pending';
    const items = missing.map(s => `<div class="missing-item">${s[lang]} <span style="color:var(--text-faint);font-weight:500;">· ${lang==='en'?s.ko:s.en}</span></div>`).join('');
    verdict.innerHTML = `
      <div class="vicon">⏳</div>
      <div class="vtitle">${t.pendingTitle(missing.length)}</div>
      <div class="vsub">${t.pendingSub}</div>
      <div class="missing-list">${items}</div>
    `;
  }
}

function renderStats(){
  const t = T[lang];
  const all = Object.values(RECORDS);
  const total = all.length;
  const complete = all.filter(b => b === 15).length;
  const ce1c = all.filter(b => b & 1).length;
  const ce2c = all.filter(b => b & 2).length;
  const mc1c = all.filter(b => b & 4).length;
  const mc2c = all.filter(b => b & 8).length;
  const stats = [
    [total, t.statTotal],
    [complete, t.statComplete],
    [ce1c, SURVEYS[0][lang]],
    [ce2c, SURVEYS[1][lang]],
    [mc1c, SURVEYS[2][lang]],
    [mc2c, SURVEYS[3][lang]],
  ];
  statsGrid.innerHTML = stats.map(([n,lbl]) => `
    <div class="stat">
      <div class="num">${n}</div>
      <div class="lbl">${lbl}</div>
    </div>
  `).join('');
}

function setLanguage(newLang){
  lang = newLang;
  applyStaticText();
  renderStats();
  if(lastSid !== null){
    const bits = RECORDS[lastSid];
    renderLine(bits);
    renderVerdict(bits);
  }
}

langToggle.addEventListener('click', () => setLanguage(lang === 'en' ? 'ko' : 'en'));
goBtn.addEventListener('click', runSearch);
sidInput.addEventListener('keydown', e => { if(e.key === 'Enter') runSearch(); });
sidInput.addEventListener('input', () => {
  sidInput.value = sidInput.value.replace(/\D/g,'').slice(0,9);
});

statsBtn.addEventListener('click', () => {
  statsPanel.classList.toggle('show');
  statsBtn.textContent = statsPanel.classList.contains('show') ? T[lang].statsHide : T[lang].statsShow;
});

infoToggle.addEventListener('click', showDisclaimer);
discClose.addEventListener('click', hideDisclaimer);

// Init — English by default
applyStaticText();
renderStats();
showDisclaimer(); // always shown on open so nobody can miss it
</script>

</body>
