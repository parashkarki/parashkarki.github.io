<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolsHub - All-in-One Utility Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fdfeff;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism Effects */
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        /* Desktop Sidebar Styling */
        .sidebar-link {
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            color: #64748b;
            font-weight: 500;
            cursor: pointer;
        }

        .sidebar-link:hover {
            background: #f1f5f9;
            color: var(--primary);
        }

        .sidebar-link.active {
            background: #eef2ff;
            color: var(--primary);
        }

        /* App Icon Animations */
        .app-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-card:hover {
            transform: translateY(-5px);
        }

        .app-card:active {
            transform: scale(0.95);
        }

        .icon-box {
            transition: transform 0.3s ease;
        }

        .app-card:hover .icon-box {
            transform: scale(1.1);
        }

        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        /* Responsiveness Tweak for the Grid */
        @media (min-width: 1024px) {
            .tools-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen">

    <!-- DESKTOP SIDEBAR -->
    <aside class="hidden lg:flex flex-col w-64 bg-white border-r border-slate-200 sticky top-0 h-screen p-6">
        <div class="flex items-center gap-3 mb-10 cursor-pointer" onclick="filterBySection('all')">
            <div class="bg-indigo-600 p-2 rounded-xl">
                <i class="fas fa-layer-group text-white text-xl"></i>
            </div>
            <h1 class="text-xl font-bold gradient-text">ToolsHub</h1>
        </div>

        <nav class="flex-1 space-y-2">
            <div onclick="filterBySection('all')" class="sidebar-link nav-item active" data-section="all">
                <i class="fas fa-home mr-3"></i> Home
            </div>
            <div onclick="filterBySection('categories')" class="sidebar-link nav-item" data-section="categories">
                <i class="fas fa-th-large mr-3"></i> Categories
            </div>
            <div onclick="filterBySection('favorites')" class="sidebar-link nav-item" data-section="favorites">
                <i class="fas fa-star mr-3"></i> Favorites
            </div>
            <div onclick="filterBySection('recent')" class="sidebar-link nav-item" data-section="recent">
                <i class="fas fa-history mr-3"></i> Recent
            </div>
        </nav>

        <div class="mt-auto pt-6 border-t border-slate-100">
            <div onclick="showSettings()" class="sidebar-link nav-item">
                <i class="fas fa-cog mr-3"></i> Settings
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <div class="flex-1 flex flex-col min-w-0">
        
        <!-- HEADER -->
        <header class="sticky top-0 z-50 glass-header px-6 py-4">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center justify-between lg:hidden">
                    <h1 class="text-2xl font-bold gradient-text">ToolsHub</h1>
                    <button class="text-slate-500"><i class="fas fa-user-circle text-2xl"></i></button>
                </div>
                
                <div class="hidden lg:block">
                    <h2 class="text-sm font-medium text-slate-400 uppercase tracking-widest" id="viewTitleLabel">Dashboard</h2>
                    <p class="text-lg font-bold text-slate-800" id="viewTitleName">Welcome back, User</p>
                </div>

                <!-- Search Bar -->
                <div class="relative w-full md:w-96">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-search text-slate-400"></i>
                    </span>
                    <input type="text" id="toolSearch" onkeyup="filterTools()" 
                           class="block w-full pl-10 pr-3 py-2.5 bg-slate-100 border-none rounded-2xl text-sm placeholder-slate-500 focus:bg-white focus:ring-2 focus:ring-indigo-500 transition-all outline-none" 
                           placeholder="Search your tools...">
                </div>

                <div class="hidden lg:flex items-center gap-4">
                    <button class="p-2 text-slate-400 hover:text-indigo-600 transition"><i class="far fa-bell text-xl"></i></button>
                    <div class="h-8 w-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-xs border border-indigo-200 cursor-pointer">
                        JD
                    </div>
                </div>
            </div>
        </header>

        <!-- APP GRID AREA -->
        <main class="max-w-6xl mx-auto w-full px-6 py-8">
            
            <section class="mb-10" id="mainToolsSection">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest" id="sectionHeading">Available Tools</h2>
                    <span class="text-xs text-indigo-600 font-semibold cursor-pointer hover:underline" onclick="filterBySection('all')">View All</span>
                </div>

                <!-- Tools Grid -->
                <div id="toolsGrid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-4 xl:grid-cols-5 gap-6 md:gap-8 tools-grid">
                    
                    <!-- Assignments -->
                    <div class="tool-item" data-category="productivity" data-favorite="true">
                        <a href="assignments.html" onclick="trackRecent('Assignments')" class="app-card flex flex-col items-center group">
                            <div class="icon-box w-16 h-16 md:w-20 md:h-20 bg-blue-500 rounded-[1.5rem] flex items-center justify-center shadow-xl shadow-blue-100 mb-3 relative">
                                <i class="fas fa-tasks text-white text-2xl md:text-3xl"></i>
                                <div class="absolute -top-1 -right-1 bg-white p-1 rounded-full shadow-sm">
                                    <i class="fas fa-star text-yellow-400 text-[10px]"></i>
                                </div>
                            </div>
                            <span class="text-xs md:text-sm font-semibold text-slate-700 text-center tool-name">Assignments</span>
                        </a>
                    </div>

                    <!-- Randomizer -->
                    <div class="tool-item" data-category="utility" data-favorite="true">
                        <a href="randomizer.html" onclick="trackRecent('Randomizer')" class="app-card flex flex-col items-center group">
                            <div class="icon-box w-16 h-16 md:w-20 md:h-20 bg-purple-500 rounded-[1.5rem] flex items-center justify-center shadow-xl shadow-purple-100 mb-3 relative">
                                <i class="fas fa-random text-white text-2xl md:text-3xl"></i>
                                <div class="absolute -top-1 -right-1 bg-white p-1 rounded-full shadow-sm">
                                    <i class="fas fa-star text-yellow-400 text-[10px]"></i>
                                </div>
                            </div>
                            <span class="text-xs md:text-sm font-semibold text-slate-700 text-center tool-name">Randomizer</span>
                        </a>
                    </div>

                    <!-- Calculator -->
                    <div class="tool-item" data-category="utility" data-favorite="false">
                        <a href="calculator.html" onclick="trackRecent('Calculator')" class="app-card flex flex-col items-center group">
                            <div class="icon-box w-16 h-16 md:w-20 md:h-20 bg-orange-500 rounded-[1.5rem] flex items-center justify-center shadow-xl shadow-orange-100 mb-3">
                                <i class="fas fa-calculator text-white text-2xl md:text-3xl"></i>
                            </div>
                            <span class="text-xs md:text-sm font-semibold text-slate-700 text-center tool-name">Calculator</span>
                        </a>
                    </div>

                    <!-- Notes -->
                    <div class="tool-item" data-category="productivity" data-favorite="false">
                        <a href="notes.html" onclick="trackRecent('Quick Notes')" class="app-card flex flex-col items-center group">
                            <div class="icon-box w-16 h-16 md:w-20 md:h-20 bg-emerald-500 rounded-[1.5rem] flex items-center justify-center shadow-xl shadow-emerald-100 mb-3">
                                <i class="fas fa-sticky-note text-white text-2xl md:text-3xl"></i>
                            </div>
                            <span class="text-xs md:text-sm font-semibold text-slate-700 text-center tool-name">Quick Notes</span>
                        </a>
                    </div>

                    <!-- PDF -->
                    <div class="tool-item" data-category="document" data-favorite="false">
                        <a href="pdf.html" onclick="trackRecent('PDF Tools')" class="app-card flex flex-col items-center group">
                            <div class="icon-box w-16 h-16 md:w-20 md:h-20 bg-rose-500 rounded-[1.5rem] flex items-center justify-center shadow-xl shadow-rose-100 mb-3">
                                <i class="fas fa-file-pdf text-white text-2xl md:text-3xl"></i>
                            </div>
                            <span class="text-xs md:text-sm font-semibold text-slate-700 text-center tool-name">PDF Tools</span>
                        </a>
                    </div>

                    <!-- Converter -->
                    <div class="tool-item" data-category="utility" data-favorite="false">
                        <a href="units.html" onclick="trackRecent('Converter')" class="app-card flex flex-col items-center group">
                            <div class="icon-box w-16 h-16 md:w-20 md:h-20 bg-cyan-500 rounded-[1.5rem] flex items-center justify-center shadow-xl shadow-cyan-100 mb-3">
                                <i class="fas fa-ruler-combined text-white text-2xl md:text-3xl"></i>
                            </div>
                            <span class="text-xs md:text-sm font-semibold text-slate-700 text-center tool-name">Converter</span>
                        </a>
                    </div>

                </div>
            </section>

            <!-- NO RESULTS MESSAGE -->
            <div id="noResults" class="hidden text-center py-20">
                <div class="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-search text-slate-300 text-3xl"></i>
                </div>
                <h3 class="text-slate-800 font-bold text-lg">Nothing found here</h3>
                <p class="text-slate-400">Try a different filter or search term.</p>
            </div>

        </main>
    </div>

    <!-- MOBILE BOTTOM NAVIGATION -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 glass-header border-t border-slate-200 px-6 py-3 flex justify-between items-center z-50">
        <button onclick="filterBySection('all')" class="flex flex-col items-center nav-item active" data-section="all">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-bold mt-1 uppercase tracking-tighter">Home</span>
        </button>
        <button onclick="filterBySection('categories')" class="flex flex-col items-center nav-item" data-section="categories">
            <i class="fas fa-th-large text-xl"></i>
            <span class="text-[10px] font-bold mt-1 uppercase tracking-tighter">Apps</span>
        </button>
        <button onclick="filterBySection('favorites')" class="flex flex-col items-center nav-item" data-section="favorites">
            <i class="fas fa-star text-xl"></i>
            <span class="text-[10px] font-bold mt-1 uppercase tracking-tighter">Favs</span>
        </button>
        <button onclick="showSettings()" class="flex flex-col items-center nav-item">
            <i class="fas fa-cog text-xl"></i>
            <span class="text-[10px] font-bold mt-1 uppercase tracking-tighter">Set</span>
        </button>
    </nav>

    <script>
        // Track Recent tools using LocalStorage
        function trackRecent(toolName) {
            let recent = JSON.parse(localStorage.getItem('recentTools') || '[]');
            recent = [toolName, ...recent.filter(t => t !== toolName)].slice(0, 5);
            localStorage.setItem('recentTools', JSON.stringify(recent));
        }

        // Search Function
        function filterTools() {
            const input = document.getElementById('toolSearch');
            const filter = input.value.toLowerCase();
            const tools = document.querySelectorAll('.tool-item');
            const grid = document.getElementById('toolsGrid');
            const noResults = document.getElementById('noResults');
            let visibleCount = 0;

            tools.forEach(tool => {
                const name = tool.querySelector('.tool-name').textContent;
                if (name.toLowerCase().includes(filter)) {
                    tool.classList.remove('hidden');
                    visibleCount++;
                } else {
                    tool.classList.add('hidden');
                }
            });

            noResults.classList.toggle('hidden', visibleCount > 0);
            grid.classList.toggle('hidden', visibleCount === 0);
        }

        // Sidebar & Bottom Nav Filtering Logic
        function filterBySection(section) {
            const tools = document.querySelectorAll('.tool-item');
            const noResults = document.getElementById('noResults');
            const grid = document.getElementById('toolsGrid');
            const label = document.getElementById('viewTitleLabel');
            const name = document.getElementById('viewTitleName');
            const heading = document.getElementById('sectionHeading');

            // Update UI Active States
            document.querySelectorAll('.nav-item').forEach(item => {
                if(item.dataset.section === section) {
                    item.classList.add('active', 'text-indigo-600');
                    item.classList.remove('text-slate-400');
                } else {
                    item.classList.remove('active', 'text-indigo-600');
                    if(!item.classList.contains('sidebar-link')) item.classList.add('text-slate-400');
                }
            });

            let visibleCount = 0;

            if (section === 'all') {
                label.textContent = "Dashboard";
                name.textContent = "Welcome back, User";
                heading.textContent = "Available Tools";
                tools.forEach(t => { t.classList.remove('hidden'); visibleCount++; });
            } 
            else if (section === 'favorites') {
                label.textContent = "Collections";
                name.textContent = "Your Favorites";
                heading.textContent = "Starred Items";
                tools.forEach(t => {
                    const isFav = t.dataset.favorite === 'true';
                    t.classList.toggle('hidden', !isFav);
                    if (isFav) visibleCount++;
                });
            } 
            else if (section === 'recent') {
                label.textContent = "History";
                name.textContent = "Recently Used";
                heading.textContent = "Last 5 Tools Used";
                const recentList = JSON.parse(localStorage.getItem('recentTools') || '[]');
                tools.forEach(t => {
                    const toolName = t.querySelector('.tool-name').textContent;
                    const isRecent = recentList.includes(toolName);
                    t.classList.toggle('hidden', !isRecent);
                    if (isRecent) visibleCount++;
                });
            } 
            else if (section === 'categories') {
                // For categories, we show everything but perhaps could grouped them in a real app
                // Here we'll just show the labels
                label.textContent = "Browser";
                name.textContent = "Explore Categories";
                heading.textContent = "All Tools by Category";
                tools.forEach(t => { t.classList.remove('hidden'); visibleCount++; });
            }

            noResults.classList.toggle('hidden', visibleCount > 0);
            grid.classList.toggle('hidden', visibleCount === 0);
        }

        function showSettings() {
            alert("Settings panel coming soon! Here you will be able to customize your theme and profile.");
        }

        // Initialize view on load
        window.onload = () => filterBySection('all');
    </script>
</body>
</html>
