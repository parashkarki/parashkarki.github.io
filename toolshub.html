<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TOOLHUB — Professional Utilities</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg-dark: #0a0c12;
    --surface-1: #111318;
    --surface-2: #181c24;
    --surface-3: #1f232e;
    --border-subtle: #2a2f3c;
    --accent-primary: #3b82f6;
    --accent-primary-glow: rgba(59,130,246,0.25);
    --accent-success: #10b981;
    --accent-warning: #f59e0b;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #5b6a8a;
    --card-radius: 20px;
    --btn-radius: 14px;
  }

  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* background refinement */
  .bg-grain {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  .app-container {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 20px 100px 20px;
    position: relative;
    z-index: 2;
  }

  /* header */
  .header {
    padding: 28px 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 32px;
  }
  .logo h1 {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(145deg, #fff, var(--accent-primary));
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo p {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .badge-header {
    background: var(--surface-2);
    padding: 8px 16px;
    border-radius: 60px;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--accent-primary);
    border: 1px solid var(--border-subtle);
    backdrop-filter: blur(4px);
  }

  /* tool grid (modern) */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 18px;
    margin-bottom: 48px;
  }
  .tool-card {
    background: var(--surface-1);
    border: 1px solid var(--border-subtle);
    border-radius: var(--card-radius);
    padding: 24px 16px 20px;
    transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    cursor: pointer;
    position: relative;
    backdrop-filter: blur(2px);
  }
  .tool-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent-primary);
    background: var(--surface-2);
    box-shadow: 0 16px 32px -12px rgba(0,0,0,0.5);
  }
  .tool-icon {
    font-size: 2.2rem;
    margin-bottom: 16px;
  }
  .tool-name {
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: -0.2px;
    margin-bottom: 4px;
  }
  .tool-desc {
    font-size: 0.7rem;
    color: var(--text-secondary);
    line-height: 1.4;
  }
  .tool-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 0.6rem;
    font-weight: 600;
    background: rgba(59,130,246,0.12);
    padding: 4px 8px;
    border-radius: 40px;
    color: var(--accent-primary);
    border: 0.5px solid rgba(59,130,246,0.3);
  }

  /* PANEL OVERLAY (modern sheet) */
  .panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 7, 12, 0.85);
    backdrop-filter: blur(14px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .panel-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; backdrop-filter: blur(0);}
    to { opacity: 1; backdrop-filter: blur(14px);}
  }
  .panel {
    background: var(--surface-2);
    border-radius: 32px;
    max-width: 800px;
    width: 100%;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border-subtle);
    box-shadow: 0 40px 90px rgba(0,0,0,0.5);
    animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    overflow: hidden;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .panel-header {
    padding: 22px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--surface-1);
  }
  .panel-icon {
    width: 48px;
    height: 48px;
    background: rgba(59,130,246,0.12);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
  }
  .panel-title-area {
    flex: 1;
  }
  .panel-title {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .panel-subtitle {
    font-size: 0.7rem;
    color: var(--text-secondary);
  }
  .panel-close {
    background: var(--surface-3);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 40px;
    color: var(--text-secondary);
    font-size: 1.2rem;
    cursor: pointer;
    transition: 0.2s;
  }
  .panel-close:hover {
    background: var(--border-subtle);
    color: white;
  }
  .panel-body {
    padding: 24px;
    overflow-y: auto;
    flex: 1;
  }

  /* form elements – rectangular */
  input, select, textarea, button {
    font-family: 'Inter', sans-serif;
    border-radius: var(--btn-radius);
  }
  .input-group {
    margin-bottom: 16px;
  }
  .input-group label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    display: block;
    margin-bottom: 6px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--surface-1);
    border: 1px solid var(--border-subtle);
    padding: 12px 14px;
    color: var(--text-primary);
    font-size: 0.9rem;
    outline: none;
    transition: 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
  }
  button {
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
    border: none;
  }
  .btn-primary {
    background: var(--accent-primary);
    color: white;
    padding: 10px 18px;
    font-size: 0.85rem;
  }
  .btn-primary:hover {
    background: #2563eb;
    transform: translateY(-1px);
  }
  .btn-secondary {
    background: var(--surface-3);
    border: 1px solid var(--border-subtle);
    color: var(--text-primary);
    padding: 10px 16px;
  }
  .btn-secondary:hover {
    background: var(--surface-1);
    border-color: var(--accent-primary);
  }
  .btn-sm {
    padding: 6px 14px;
    font-size: 0.75rem;
  }
  .action-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 20px 0 12px;
  }
  .result-card {
    background: var(--surface-1);
    border: 1px solid var(--border-subtle);
    border-radius: 20px;
    padding: 18px;
    margin-top: 16px;
    text-align: center;
  }
  .result-number {
    font-size: 2.8rem;
    font-weight: 800;
    background: linear-gradient(145deg, #fff, var(--accent-primary));
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .history-item {
    padding: 8px 12px;
    background: var(--surface-1);
    border-radius: 12px;
    margin-bottom: 6px;
    font-family: monospace;
    font-size: 0.8rem;
    border-left: 2px solid var(--accent-primary);
  }
  .pill-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .pill {
    background: var(--surface-3);
    padding: 6px 14px;
    border-radius: 40px;
    font-size: 0.8rem;
  }
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 600px) {
    .app-container { padding: 0 16px 90px 16px; }
    .tools-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .tool-card { padding: 18px 12px; }
    .tool-icon { font-size: 1.8rem; }
    .tool-name { font-size: 0.9rem; }
    .panel-header { padding: 16px; }
    .panel-title { font-size: 1.2rem; }
    .grid-2 { grid-template-columns: 1fr; }
    .result-number { font-size: 2rem; }
  }
  /* tab navigation */
  .tab-bar {
    display: flex;
    gap: 4px;
    background: var(--surface-1);
    border-radius: 60px;
    padding: 4px;
    margin-bottom: 24px;
    overflow-x: auto;
  }
  .tab-btn {
    flex: 1;
    text-align: center;
    background: transparent;
    color: var(--text-secondary);
    padding: 10px 0;
    border-radius: 40px;
    font-weight: 600;
    font-size: 0.75rem;
    white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--accent-primary);
    color: white;
  }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; animation: fadeQuick 0.2s; }
  @keyframes fadeQuick { from { opacity: 0; } to { opacity: 1; } }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent-primary);
    color: white;
    padding: 10px 24px;
    border-radius: 60px;
    font-size: 0.8rem;
    font-weight: 500;
    opacity: 0;
    transition: 0.2s;
    z-index: 1200;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .strength-bar {
    height: 6px;
    background: var(--surface-3);
    border-radius: 10px;
    overflow: hidden;
    margin: 8px 0;
  }
  .strength-fill { height: 100%; width: 0; background: var(--accent-success); transition: 0.2s; }
</style>
</head>
<body>
<div class="bg-grain"></div>
<div class="app-container">
  <div class="header">
    <div class="logo">
      <h1>TOOLHUB</h1>
      <p>professional utilities · real time</p>
    </div>
    <div class="badge-header">⚡ live tools</div>
  </div>

  <div class="tools-grid" id="toolsGrid"></div>
</div>

<div class="panel-overlay" id="panelOverlay">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-icon" id="panelIcon">🎲</div>
      <div class="panel-title-area">
        <div class="panel-title" id="panelTitle">Randomizer</div>
        <div class="panel-subtitle" id="panelSubtitle">// pro generator</div>
      </div>
      <button class="panel-close" id="closePanelBtn">✕</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>
<div class="toast" id="toastMsg"></div>

<script>
  // ======================== TOOLS REGISTRY (NO COIN) ==================
  const toolsCatalog = [
    { id: 'randomizer', icon: '🎲', name: 'Randomizer', desc: 'Numbers, lists, groups, weighted', badge: 'PRO', color: '#3b82f6' },
    { id: 'dice', icon: '🎯', name: 'Dice Roller', desc: 'd4 to d100, modifiers', badge: 'DICE', color: '#f59e0b' },
    { id: 'wheel', icon: '🎡', name: 'Spin Wheel', desc: 'Custom decision spinner', badge: 'PICK', color: '#10b981' },
    { id: 'password', icon: '🔐', name: 'Password Gen', desc: 'Secure & strength meter', badge: 'SECURE', color: '#8b5cf6' },
    { id: 'uuid', icon: '🆔', name: 'UUID v4', desc: 'Unique IDs generator', badge: 'DEV', color: '#ec489a' }
  ];

  const gridContainer = document.getElementById('toolsGrid');
  function buildToolGrid() {
    gridContainer.innerHTML = '';
    toolsCatalog.forEach(t => {
      const card = document.createElement('div');
      card.className = 'tool-card';
      card.setAttribute('data-id', t.id);
      card.innerHTML = `
        <div class="tool-badge">${t.badge}</div>
        <div class="tool-icon">${t.icon}</div>
        <div class="tool-name">${t.name}</div>
        <div class="tool-desc">${t.desc}</div>
      `;
      card.addEventListener('click', () => openToolPanel(t.id));
      gridContainer.appendChild(card);
    });
  }

  // Panel management
  const overlay = document.getElementById('panelOverlay');
  const panelBody = document.getElementById('panelBody');
  const panelIcon = document.getElementById('panelIcon');
  const panelTitle = document.getElementById('panelTitle');
  const panelSubtitle = document.getElementById('panelSubtitle');
  function openToolPanel(toolId) {
    const tool = toolsCatalog.find(t => t.id === toolId);
    if (!tool) return;
    panelIcon.textContent = tool.icon;
    panelTitle.textContent = tool.name;
    panelSubtitle.textContent = `// ${tool.desc}`;
    renderToolContent(toolId);
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closePanel() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('closePanelBtn').addEventListener('click', closePanel);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closePanel(); });
  function toastMsg(msg) {
    const toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => toastMsg('Copied!'));
  }

  // =========================== RANDOMIZER (full featured) ===========================
  let randHistoryNum = [];
  let lastGroupsResult = [];
  let lastSeqArray = [];
  let weightedItems = [];

  function renderRandomizer() {
    panelBody.innerHTML = `
      <div class="tab-bar" id="randTabsBar">
        <button class="tab-btn active" data-tab="num">🔢 Numbers</button>
        <button class="tab-btn" data-tab="multi">📊 Multiple</button>
        <button class="tab-btn" data-tab="list">📋 From List</button>
        <button class="tab-btn" data-tab="groups">👥 Groups</button>
        <button class="tab-btn" data-tab="seq">🔀 Sequence</button>
        <button class="tab-btn" data-tab="weighted">⚖️ Weighted</button>
      </div>
      <div id="randContent"></div>
    `;
    const tabs = document.querySelectorAll('#randTabsBar .tab-btn');
    const contentDiv = document.getElementById('randContent');
    function switchTab(tabId) {
      let html = '';
      if (tabId === 'num') html = getNumberTab();
      else if (tabId === 'multi') html = getMultiTab();
      else if (tabId === 'list') html = getListTab();
      else if (tabId === 'groups') html = getGroupsTab();
      else if (tabId === 'seq') html = getSeqTab();
      else if (tabId === 'weighted') html = getWeightedTab();
      contentDiv.innerHTML = html;
      attachRandEventListeners(tabId);
    }
    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        switchTab(btn.getAttribute('data-tab'));
      });
    });
    switchTab('num');
  }

  function getNumberTab() { return `<div class="input-group"><label>MIN</label><input type="number" id="numMin" value="1"></div><div class="input-group"><label>MAX</label><input type="number" id="numMax" value="100"></div><button class="btn-primary" id="genNumBtn">🎲 Generate</button><div class="result-card" id="numResult">—</div><div id="numHistory"></div>`; }
  function getMultiTab() { return `<div class="grid-2"><div class="input-group"><label>MIN</label><input type="number" id="multiMin" value="1"></div><div class="input-group"><label>MAX</label><input type="number" id="multiMax" value="100"></div></div><div class="input-group"><label>COUNT</label><input type="number" id="multiCount" value="5" min="1" max="30"></div><label class="custom-check" style="display:flex;gap:8px;margin:8px 0"><input type="checkbox" id="uniqueOnly"> <span style="color:var(--text-secondary)">Unique only</span></label><button class="btn-primary" id="genMultiBtn">Generate batch</button><div class="result-card" id="multiResult"></div>`; }
  function getListTab() { return `<div class="input-group"><label>ITEMS (comma or line break)</label><textarea id="listRaw" rows="4" placeholder="Apple, Banana, Cherry&#10;Pizza, Sushi, Burger"></textarea></div><div class="input-group"><label>Number to pick</label><input type="number" id="pickCount" value="1" min="1"></div><button class="btn-primary" id="pickListBtn">Pick random</button><div class="result-card" id="listPickResult"></div>`; }
  function getGroupsTab() { return `<div class="input-group"><label>MEMBERS (comma or newline)</label><textarea id="groupMembers" rows="4" placeholder="Alice, Bob, Charlie, Diana, Eve, Frank, Grace, Henry"></textarea></div><div class="grid-2"><div class="input-group"><label># GROUPS</label><input type="number" id="groupCount" value="3" min="2"></div><div class="input-group"><label>PREFIX</label><input type="text" id="groupPrefix" value="Team"></div></div><button class="btn-primary" id="makeGroupsBtn">⚡ Create groups</button><div id="groupsDisplay"></div>`; }
  function getSeqTab() { return `<div class="grid-2"><div class="input-group"><label>FROM</label><input type="number" id="seqFrom" value="1"></div><div class="input-group"><label>TO</label><input type="number" id="seqTo" value="20"></div></div><button class="btn-primary" id="shuffleSeqBtn">🔀 Shuffle sequence</button><div class="result-card" id="seqResultDisplay"></div>`; }
  function getWeightedTab() { return `<div style="display:flex;gap:8px;flex-wrap:wrap"><input type="text" id="weightItem" placeholder="Item name" style="flex:2"><input type="number" id="weightVal" placeholder="Weight" style="width:90px"><button class="btn-secondary" id="addWeightBtn">Add</button><button class="btn-secondary" id="loadWeightPreset">Load Example</button></div><div id="weightedListArea" style="margin:16px 0; max-height:200px; overflow:auto"></div><button class="btn-primary" id="rollWeightedBtn">🎲 Pick weighted</button><div class="result-card" id="weightedResult"></div>`; }

  function attachRandEventListeners(activeTab) {
    if (activeTab === 'num') {
      document.getElementById('genNumBtn')?.addEventListener('click', () => {
        const min = +document.getElementById('numMin').value, max = +document.getElementById('numMax').value;
        if (min > max) { toastMsg('Min <= Max'); return; }
        const val = Math.floor(Math.random() * (max - min + 1)) + min;
        randHistoryNum.unshift({ val, range: `${min}-${max}`, time: new Date().toLocaleTimeString() });
        if (randHistoryNum.length > 6) randHistoryNum.pop();
        document.getElementById('numResult').innerHTML = `<div class="result-number">${val}</div><div class="text-secondary" style="font-size:0.7rem">Range ${min}–${max}</div>`;
        const histDiv = document.getElementById('numHistory');
        histDiv.innerHTML = randHistoryNum.length ? `<div style="margin-top:12px"><strong>Recent</strong>${randHistoryNum.map(h => `<div class="history-item">${h.time}  →  ${h.val}</div>`).join('')}</div>` : '';
      });
    }
    if (activeTab === 'multi') {
      document.getElementById('genMultiBtn')?.addEventListener('click', () => {
        let min = +document.getElementById('multiMin').value, max = +document.getElementById('multiMax').value, cnt = Math.min(+document.getElementById('multiCount').value, 30);
        const unique = document.getElementById('uniqueOnly').checked;
        if (min > max) { toastMsg('Min <= Max'); return; }
        let results = [];
        if (unique) {
          if (max - min + 1 < cnt) { toastMsg('Range too small for unique'); return; }
          let pool = Array.from({ length: max - min + 1 }, (_, i) => min + i);
          for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
          results = pool.slice(0, cnt);
        } else {
          for (let i = 0; i < cnt; i++) results.push(Math.floor(Math.random() * (max - min + 1)) + min);
        }
        const sum = results.reduce((a, b) => a + b, 0);
        document.getElementById('multiResult').innerHTML = `<div class="pill-list">${results.map(r => `<span class="pill">${r}</span>`).join('')}</div><div style="margin-top:12px; font-size:0.75rem">Sum: ${sum} | Avg: ${(sum/results.length).toFixed(1)}</div>`;
      });
    }
    if (activeTab === 'list') {
      document.getElementById('pickListBtn')?.addEventListener('click', () => {
        let raw = document.getElementById('listRaw').value;
        let items = raw.split(/,|\n/).map(s => s.trim()).filter(Boolean);
        if (!items.length) { toastMsg('Enter items'); return; }
        let cnt = Math.min(+document.getElementById('pickCount').value, items.length);
        let shuffled = [...items];
        for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
        let picked = shuffled.slice(0, cnt);
        document.getElementById('listPickResult').innerHTML = `<div class="pill-list">${picked.map(p => `<span class="pill">${p}</span>`).join('')}</div><div style="margin-top:6px">from ${items.length} items</div>`;
      });
    }
    if (activeTab === 'groups') {
      document.getElementById('makeGroupsBtn')?.addEventListener('click', () => {
        let raw = document.getElementById('groupMembers').value;
        let members = raw.split(/,|\n/).map(s => s.trim()).filter(Boolean);
        if (members.length < 2) { toastMsg('Need at least 2 members'); return; }
        let groupNum = Math.min(Math.max(+document.getElementById('groupCount').value, 2), members.length);
        let shuffled = [...members];
        for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
        let groups = Array.from({ length: groupNum }, () => []);
        shuffled.forEach((m, idx) => groups[idx % groupNum].push(m));
        lastGroupsResult = groups;
        let prefix = document.getElementById('groupPrefix').value || 'Group';
        let html = `<div style="display:flex; flex-direction:column; gap:12px; margin-top:12px">`;
        groups.forEach((g, i) => { html += `<div style="background:var(--surface-1); border-radius:20px; padding:12px"><div style="font-weight:700">${prefix} ${i+1} <span style="font-size:0.7rem; color:var(--text-muted)">(${g.length})</span></div><div class="pill-list">${g.map(m => `<span class="pill">${m}</span>`).join('')}</div></div>`; });
        html += `<button class="btn-secondary btn-sm" id="copyGroupsBtn">📋 Copy groups</button></div>`;
        document.getElementById('groupsDisplay').innerHTML = html;
        document.getElementById('copyGroupsBtn')?.addEventListener('click', () => {
          let txt = lastGroupsResult.map((g, idx) => `${prefix} ${idx+1}: ${g.join(', ')}`).join('\n');
          copyToClipboard(txt);
        });
      });
    }
    if (activeTab === 'seq') {
      document.getElementById('shuffleSeqBtn')?.addEventListener('click', () => {
        let from = +document.getElementById('seqFrom').value, to = +document.getElementById('seqTo').value;
        if (from > to) { toastMsg('From <= To'); return; }
        let arr = Array.from({ length: to - from + 1 }, (_, i) => from + i);
        for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
        lastSeqArray = arr;
        document.getElementById('seqResultDisplay').innerHTML = `<div class="pill-list">${arr.map(n => `<span class="pill">${n}</span>`).join('')}</div><button class="btn-secondary btn-sm" id="copySeqBtn">Copy order</button>`;
        document.getElementById('copySeqBtn')?.addEventListener('click', () => copyToClipboard(lastSeqArray.join(', ')));
      });
    }
    if (activeTab === 'weighted') {
      function renderWeightedList() {
        const container = document.getElementById('weightedListArea');
        if (!weightedItems.length) { container.innerHTML = '<div style="color:var(--text-muted); padding:12px">No items added</div>'; return; }
        container.innerHTML = weightedItems.map((it, idx) => `<div style="display:flex; justify-content:space-between; background:var(--surface-1); padding:8px 12px; border-radius:12px; margin-bottom:6px"><span><strong>${it.name}</strong> (weight ${it.weight})</span><button class="removeWeight" data-idx="${idx}" style="background:none; color:red; border:none; cursor:pointer">✕</button></div>`).join('');
        document.querySelectorAll('.removeWeight').forEach(btn => {
          btn.addEventListener('click', (e) => { const idx = parseInt(btn.getAttribute('data-idx')); weightedItems.splice(idx, 1); renderWeightedList(); });
        });
      }
      document.getElementById('addWeightBtn')?.addEventListener('click', () => {
        let name = document.getElementById('weightItem').value.trim();
        let weight = parseInt(document.getElementById('weightVal').value);
        if (!name) { toastMsg('Enter item name'); return; }
        if (isNaN(weight) || weight < 1) weight = 1;
        weightedItems.push({ name, weight });
        document.getElementById('weightItem').value = '';
        renderWeightedList();
      });
      document.getElementById('loadWeightPreset')?.addEventListener('click', () => {
        weightedItems = [{ name: 'Common', weight: 60 }, { name: 'Rare', weight: 25 }, { name: 'Epic', weight: 10 }, { name: 'Legendary', weight: 5 }];
        renderWeightedList();
      });
      document.getElementById('rollWeightedBtn')?.addEventListener('click', () => {
        if (!weightedItems.length) { toastMsg('Add weighted items first'); return; }
        let total = weightedItems.reduce((s, i) => s + i.weight, 0);
        let rand = Math.random() * total;
        let accum = 0, selected = null;
        for (let item of weightedItems) { accum += item.weight; if (rand <= accum) { selected = item; break; } }
        if (!selected) selected = weightedItems[0];
        document.getElementById('weightedResult').innerHTML = `<div class="result-number" style="font-size:1.8rem">🎲 ${selected.name}</div><div>weight ${selected.weight} · chance ${((selected.weight/total)*100).toFixed(1)}%</div>`;
      });
      renderWeightedList();
    }
  }

  // ===================== DICE ROLLER =====================
  let diceHistory = [];
  function renderDice() {
    panelBody.innerHTML = `
      <div class="tab-bar" style="margin-bottom:20px"><button class="tab-btn active" data-dice="6">d6</button><button data-dice="4">d4</button><button data-dice="8">d8</button><button data-dice="10">d10</button><button data-dice="12">d12</button><button data-dice="20">d20</button><button data-dice="100">d100</button></div>
      <div class="grid-2"><div class="input-group"><label># of dice</label><input type="number" id="diceCount" value="1" min="1" max="12"></div><div class="input-group"><label>Modifier</label><input type="number" id="diceMod" value="0"></div></div>
      <button class="btn-primary" id="rollDiceBtn">🎲 Roll</button>
      <div class="result-card" id="diceResultArea">—</div>
      <div id="diceHistList"></div>
    `;
    let currentDice = 6;
    document.querySelectorAll('[data-dice]').forEach(btn => {
      btn.addEventListener('click', () => { document.querySelectorAll('[data-dice]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentDice = parseInt(btn.getAttribute('data-dice')); });
      if (btn.getAttribute('data-dice') === '6') btn.classList.add('active');
    });
    document.getElementById('rollDiceBtn').addEventListener('click', () => {
      let count = Math.min(12, Math.max(1, +document.getElementById('diceCount').value));
      let mod = +document.getElementById('diceMod').value;
      let rolls = Array.from({ length: count }, () => Math.floor(Math.random() * currentDice) + 1);
      let sum = rolls.reduce((a,b)=>a+b,0) + mod;
      let displayRolls = rolls.join(' + ');
      document.getElementById('diceResultArea').innerHTML = `<div class="result-number">${sum}</div><div style="font-size:0.7rem">${displayRolls} ${mod ? (mod>0 ? `+ ${mod}` : `- ${-mod}`) : ''}</div><div class="pill-list">${rolls.map(r=>`<span class="pill">${r}</span>`).join('')}</div>`;
      diceHistory.unshift(`${count}d${currentDice} ${mod? (mod>0?`+${mod}`:`${mod}`):''} → ${sum}`);
      if(diceHistory.length > 5) diceHistory.pop();
      document.getElementById('diceHistList').innerHTML = diceHistory.map(h=>`<div class="history-item">${h}</div>`).join('');
    });
  }

  // ===================== WHEEL =====================
  let wheelOptions = ['Option A', 'Option B', 'Option C', 'Option D'];
  let wheelAngle = 0, spinningWheel = false;
  function renderWheel() {
    panelBody.innerHTML = `<div style="display:flex; gap:8px; flex-wrap:wrap"><input id="wheelNewItem" placeholder="Add option" style="flex:2"><button id="addWheelBtn" class="btn-secondary">Add</button></div><div id="wheelTags" style="display:flex; flex-wrap:wrap; gap:8px; margin:12px 0"></div><canvas id="wheelCanvas" width="260" height="260" style="width:100%; max-width:260px; margin:0 auto; display:block; border-radius:50%; background:var(--surface-1); box-shadow:0 8px 20px rgba(0,0,0,0.3)"></canvas><button id="spinWheelBtn" class="btn-primary" style="margin-top:16px; width:100%">SPIN WHEEL</button><div class="result-card" id="wheelResultDisplay">Ready to spin</div>`;
    function updateTags() {
      const container = document.getElementById('wheelTags');
      container.innerHTML = wheelOptions.map((opt, idx) => `<span style="background:var(--surface-3); padding:4px 12px; border-radius:40px; display:inline-flex; gap:6px"><span>${opt}</span><button data-idx="${idx}" class="removeWheelOpt" style="background:none; border:none; color:red; cursor:pointer">✕</button></span>`).join('');
      document.querySelectorAll('.removeWheelOpt').forEach(btn => { btn.addEventListener('click', (e) => { let i = parseInt(btn.getAttribute('data-idx')); wheelOptions.splice(i,1); updateTags(); drawWheelCanvas(); }); });
      drawWheelCanvas();
    }
    function drawWheelCanvas() {
      const canvas = document.getElementById('wheelCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.clientWidth; canvas.height = w;
      const center = w/2, rad = w/2 - 8;
      ctx.clearRect(0,0,w,w);
      if (!wheelOptions.length) { ctx.fillStyle = '#1f232e'; ctx.beginPath(); ctx.arc(center,center,rad,0,Math.PI*2); ctx.fill(); return; }
      const angleStep = (Math.PI*2)/wheelOptions.length;
      const colors = ['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec489a'];
      for (let i=0; i<wheelOptions.length; i++) {
        const start = wheelAngle + i*angleStep;
        const end = start + angleStep;
        ctx.beginPath(); ctx.moveTo(center,center); ctx.arc(center,center,rad,start,end); ctx.fillStyle = colors[i%colors.length]; ctx.fill();
        ctx.save(); ctx.translate(center,center); ctx.rotate(start+angleStep/2); ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.max(10, 12)}px Inter`; ctx.fillText(wheelOptions[i].substring(0,8), rad-20, 6); ctx.restore();
      }
    }
    document.getElementById('addWheelBtn')?.addEventListener('click', () => {
      const val = document.getElementById('wheelNewItem').value.trim();
      if(val) { wheelOptions.push(val); document.getElementById('wheelNewItem').value = ''; updateTags(); }
    });
    document.getElementById('spinWheelBtn')?.addEventListener('click', () => {
      if(spinningWheel || !wheelOptions.length) { toastMsg('Add at least one option'); return; }
      spinningWheel = true; const spinBtn = document.getElementById('spinWheelBtn'); spinBtn.disabled = true;
      const extra = Math.PI*2*(5+Math.random()*4);
      const start = performance.now(), startAngle = wheelAngle, duration = 1500;
      function animate(now) {
        const t = Math.min((now-start)/duration, 1);
        const ease = 1 - Math.pow(1-t, 3);
        wheelAngle = startAngle + extra * ease;
        drawWheelCanvas();
        if(t<1) requestAnimationFrame(animate);
        else {
          spinningWheel = false; spinBtn.disabled = false;
          const normAngle = ((-wheelAngle) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
          const idx = Math.floor(normAngle / ((Math.PI*2)/wheelOptions.length)) % wheelOptions.length;
          const winner = wheelOptions[idx];
          document.getElementById('wheelResultDisplay').innerHTML = `<div class="result-number" style="font-size:1.6rem">${winner}</div>`;
        }
      }
      requestAnimationFrame(animate);
    });
    updateTags();
  }

  // ===================== PASSWORD =====================
  function renderPassword() {
    panelBody.innerHTML = `<div class="input-group"><label>Length: <span id="lenVal">16</span></label><input type="range" id="passLen" min="6" max="64" value="16"></div><div style="display:flex; flex-wrap:wrap; gap:12px; margin:12px 0"><label><input type="checkbox" id="chUpper" checked> Uppercase</label><label><input type="checkbox" id="chLower" checked> Lowercase</label><label><input type="checkbox" id="chDigits" checked> Digits</label><label><input type="checkbox" id="chSymbols"> Symbols</label></div><button class="btn-primary" id="genPassBtn">Generate password</button><div class="result-card" id="passDisplay">—</div><div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div><div id="strengthText" style="font-size:0.7rem; color:var(--text-secondary)"></div>`;
    function generate() {
      let len = +document.getElementById('passLen').value;
      let upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ", lower = "abcdefghijklmnopqrstuvwxyz", digits = "0123456789", symbols = "!@#$%^&*()_+";
      let chars = "";
      if(document.getElementById('chUpper').checked) chars+=upper;
      if(document.getElementById('chLower').checked) chars+=lower;
      if(document.getElementById('chDigits').checked) chars+=digits;
      if(document.getElementById('chSymbols').checked) chars+=symbols;
      if(!chars) { toastMsg('Select at least one type'); return; }
      let password = "";
      for(let i=0;i<len;i++) password += chars[Math.floor(Math.random()*chars.length)];
      document.getElementById('passDisplay').innerHTML = `<div style="word-break:break-all; font-family:monospace">${password}</div><button class="btn-secondary btn-sm" id="copyPassBtn">Copy</button>`;
      let strength = 0;
      if(len>=12) strength+=1; if(len>=16) strength+=1;
      if(/[A-Z]/.test(password)) strength++; if(/[a-z]/.test(password)) strength++; if(/[0-9]/.test(password)) strength++; if(/[^A-Za-z0-9]/.test(password)) strength++;
      let percent = Math.min(100, strength*14);
      document.getElementById('strengthFill').style.width = `${percent}%`;
      document.getElementById('strengthFill').style.background = percent<30? '#ef4444' : percent<70? '#f59e0b' : '#10b981';
      document.getElementById('strengthText').innerText = `Strength: ${percent<30?'Weak':percent<70?'Medium':'Strong'}`;
      document.getElementById('copyPassBtn')?.addEventListener('click', () => copyToClipboard(password));
    }
    document.getElementById('passLen').addEventListener('input', (e) => { document.getElementById('lenVal').innerText = e.target.value; generate(); });
    document.getElementById('genPassBtn').addEventListener('click', generate);
    generate();
  }

  // ===================== UUID =====================
  function renderUUID() {
    panelBody.innerHTML = `<div class="input-group"><label>Number of UUIDs</label><input type="number" id="uuidCount" value="5" min="1" max="25"></div><button class="btn-primary" id="genUuidBtn">Generate UUIDs</button><div id="uuidListContainer" class="result-card" style="margin-top:12px"></div>`;
    function genUUIDv4() { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { let r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8); return v.toString(16); }); }
    function generateList() {
      let count = Math.min(25, +document.getElementById('uuidCount').value);
      let list = Array.from({length:count}, genUUIDv4);
      document.getElementById('uuidListContainer').innerHTML = `<div style="max-height:280px; overflow:auto">${list.map(u => `<div style="display:flex; justify-content:space-between; align-items:center; background:var(--surface-1); border-radius:12px; padding:8px 12px; margin-bottom:8px"><code>${u}</code><button class="copyUuidBtn btn-secondary btn-sm" data-val="${u}">Copy</button></div>`).join('')}</div>`;
      document.querySelectorAll('.copyUuidBtn').forEach(btn => { btn.addEventListener('click', () => copyToClipboard(btn.getAttribute('data-val'))); });
    }
    document.getElementById('genUuidBtn').addEventListener('click', generateList);
    generateList();
  }

  function renderToolContent(toolId) {
    if (toolId === 'randomizer') renderRandomizer();
    else if (toolId === 'dice') renderDice();
    else if (toolId === 'wheel') renderWheel();
    else if (toolId === 'password') renderPassword();
    else if (toolId === 'uuid') renderUUID();
  }

  buildToolGrid();
</script>
</body>
</html>
