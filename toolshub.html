<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOOLBOX — The Ultimate Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090f;
    --surface: #0f0f1a;
    --card: #13131f;
    --border: rgba(255,255,255,0.06);
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --accent3: #5cf0fc;
    --accent4: #fcdb5c;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --glow: rgba(124,92,252,0.3);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4;
  }

  /* ─── ORBS ─── */
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,92,252,0.18), transparent 70%); top: -100px; left: -100px; animation: drift1 20s ease-in-out infinite; }
  .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(252,92,125,0.12), transparent 70%); bottom: 0; right: -100px; animation: drift2 18s ease-in-out infinite; }
  .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(92,240,252,0.1), transparent 70%); top: 40%; left: 40%; animation: drift3 25s ease-in-out infinite; }
  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(60px,40px)} 66%{transform:translate(-30px,70px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-60px,-40px)} 66%{transform:translate(30px,-70px)} }
  @keyframes drift3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-80px,40px)} }

  /* ─── HEADER ─── */
  header {
    position: relative; z-index: 10;
    padding: 40px 40px 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-size: 1.1rem; font-weight: 800; letter-spacing: 0.25em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo span { color: var(--accent); -webkit-text-fill-color: var(--accent); }
  .tagline { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; }

  /* ─── HERO ─── */
  .hero {
    position: relative; z-index: 10;
    text-align: center; padding: 60px 20px 30px;
  }
  .hero-label {
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    color: var(--accent); letter-spacing: 0.3em; text-transform: uppercase;
    margin-bottom: 16px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .hero-label::before, .hero-label::after { content: ''; width: 30px; height: 1px; background: var(--accent); display: inline-block; }
  .hero h1 {
    font-size: clamp(2.5rem, 7vw, 5.5rem); font-weight: 800;
    line-height: 1.05; letter-spacing: -0.02em;
    background: linear-gradient(160deg, #fff 30%, rgba(255,255,255,0.5) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
  }
  .hero p { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--muted); max-width: 400px; margin: 0 auto; line-height: 1.7; }

  /* ─── TOOLS GRID ─── */
  .tools-section { position: relative; z-index: 10; padding: 40px 40px 80px; max-width: 1100px; margin: 0 auto; }
  .section-title {
    font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted);
    letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 24px;
  }
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  .tool-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 16px 20px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s both;
  }
  .tool-card:nth-child(1){animation-delay:0.05s} .tool-card:nth-child(2){animation-delay:0.1s}
  .tool-card:nth-child(3){animation-delay:0.15s} .tool-card:nth-child(4){animation-delay:0.2s}
  .tool-card:nth-child(5){animation-delay:0.25s} .tool-card:nth-child(6){animation-delay:0.3s}
  .tool-card:nth-child(7){animation-delay:0.35s} .tool-card:nth-child(8){animation-delay:0.4s}
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

  .tool-card::before {
    content: ''; position: absolute; inset: 0;
    background: var(--tool-glow, var(--glow));
    opacity: 0; transition: opacity 0.3s;
    border-radius: inherit;
  }
  .tool-card:hover { transform: translateY(-6px) scale(1.03); border-color: var(--tool-color, var(--accent)); box-shadow: 0 20px 60px var(--tool-glow, var(--glow)); }
  .tool-card:hover::before { opacity: 0.15; }
  .tool-card.active { border-color: var(--tool-color, var(--accent)); box-shadow: 0 0 0 2px var(--tool-color, var(--accent)), 0 20px 60px var(--tool-glow, var(--glow)); }

  .tool-icon {
    width: 54px; height: 54px; border-radius: 14px;
    background: var(--tool-bg, rgba(124,92,252,0.15));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px; font-size: 1.6rem;
    border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.3s;
  }
  .tool-card:hover .tool-icon { transform: scale(1.15) rotate(-5deg); }
  .tool-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; color: var(--text); }
  .tool-desc { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); line-height: 1.5; }
  .tool-badge {
    position: absolute; top: 10px; right: 10px;
    font-family: 'DM Mono', monospace; font-size: 0.55rem; font-weight: 500;
    padding: 2px 7px; border-radius: 20px; letter-spacing: 0.05em;
    background: var(--tool-badge-bg, rgba(124,92,252,0.2));
    color: var(--tool-color, var(--accent));
    border: 1px solid var(--tool-color, var(--accent));
  }

  /* ─── TOOL PANEL ─── */
  .panel-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(9,9,15,0.7); backdrop-filter: blur(8px);
    display: none; align-items: flex-end; justify-content: center;
    padding: 20px;
  }
  .panel-overlay.open { display: flex; animation: overlayIn 0.3s ease; }
  @keyframes overlayIn { from{opacity:0} to{opacity:1} }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 16px 16px;
    width: 100%; max-width: 780px;
    max-height: 88vh;
    overflow: hidden;
    display: flex; flex-direction: column;
    animation: panelUp 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
    box-shadow: 0 -20px 80px rgba(0,0,0,0.5), 0 0 0 1px var(--panel-color, var(--accent));
  }
  @keyframes panelUp { from{transform:translateY(100px);opacity:0} to{transform:translateY(0);opacity:1} }

  .panel-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .panel-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--panel-bg, rgba(124,92,252,0.15));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; flex-shrink: 0;
  }
  .panel-title-area { flex: 1; }
  .panel-title { font-size: 1.1rem; font-weight: 800; }
  .panel-subtitle { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
  .panel-close {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .panel-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  .panel-body { padding: 24px; overflow-y: auto; flex: 1; }

  /* ─── RANDOMIZER ─── */
  .rand-tabs {
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px;
    margin-bottom: 24px; overflow-x: auto; flex-shrink: 0;
  }
  .rand-tab {
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em;
    white-space: nowrap; transition: all 0.2s; color: var(--muted);
    flex-shrink: 0;
  }
  .rand-tab.active { background: var(--accent); color: #fff; }
  .rand-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.06); }

  .rand-panel { display: none; }
  .rand-panel.active { display: block; animation: fadeUp 0.3s both; }

  /* Number randomizer */
  .num-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .input-group label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; display: block; margin-bottom: 6px; }
  .input-group input, .input-group select, .input-group textarea {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 0.85rem;
    outline: none; transition: border-color 0.2s;
  }
  .input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: var(--accent); }
  .input-group textarea { resize: vertical; min-height: 80px; }
  .input-group select option { background: #1a1a2e; }

  .btn {
    padding: 12px 24px; border-radius: 12px; cursor: pointer; font-family: 'Syne', sans-serif;
    font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em; border: none;
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #9070ff; transform: translateY(-1px); box-shadow: 0 8px 30px rgba(124,92,252,0.4); }
  .btn-secondary { background: rgba(255,255,255,0.07); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: rgba(255,255,255,0.12); }
  .btn-danger { background: rgba(252,92,125,0.15); color: var(--accent2); border: 1px solid rgba(252,92,125,0.3); }
  .btn-danger:hover { background: rgba(252,92,125,0.25); }
  .btn-sm { padding: 8px 16px; font-size: 0.75rem; }

  .result-display {
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; text-align: center; margin-top: 16px;
    min-height: 80px; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
  }
  .result-number {
    font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800;
    background: linear-gradient(135deg, #fff, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    line-height: 1;
  }
  @keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  .result-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; }

  .results-list {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px;
  }
  .result-pill {
    background: rgba(124,92,252,0.15); border: 1px solid rgba(124,92,252,0.3);
    border-radius: 8px; padding: 6px 14px; font-family: 'DM Mono', monospace;
    font-size: 0.85rem; font-weight: 500; color: var(--text);
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .result-pill.highlight { background: rgba(124,92,252,0.35); border-color: var(--accent); color: #fff; }

  .history-list { margin-top: 16px; }
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; border-radius: 8px; font-family: 'DM Mono', monospace;
    font-size: 0.75rem; border-bottom: 1px solid var(--border);
    color: var(--muted);
  }
  .history-item:last-child { border-bottom: none; }
  .history-val { color: var(--text); font-weight: 500; }

  .action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

  /* Dice */
  .dice-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .dice-select-btn {
    padding: 8px 16px; border-radius: 10px; cursor: pointer; font-family: 'DM Mono', monospace;
    font-size: 0.8rem; font-weight: 500; border: 1px solid var(--border);
    background: rgba(255,255,255,0.04); color: var(--muted); transition: all 0.2s;
  }
  .dice-select-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .dice-select-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  .dice-roll-display {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    margin: 16px 0; min-height: 70px; align-items: center;
  }
  .die {
    width: 60px; height: 60px; background: rgba(124,92,252,0.15);
    border: 2px solid rgba(124,92,252,0.4); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; font-weight: 800;
    animation: diceRoll 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    transition: all 0.2s;
  }
  @keyframes diceRoll { from{transform:rotate(180deg) scale(0);opacity:0} to{transform:rotate(0deg) scale(1);opacity:1} }

  /* Wheel */
  .wheel-container { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .wheel-entries { width: 100%; }
  .wheel-entry-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 40px; }
  .wheel-entry-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.07); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 10px; font-size: 0.78rem;
  }
  .wheel-entry-tag button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.75rem; padding: 0; line-height: 1; }
  .wheel-entry-tag button:hover { color: var(--accent2); }
  .wheel-canvas-wrap {
    position: relative; width: min(280px, 90vw); height: min(280px, 90vw);
  }
  #wheelCanvas { border-radius: 50%; }
  .wheel-pointer {
    position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 22px solid #fff;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    z-index: 2;
  }
  #spinBtn {
    width: 70px; height: 70px; border-radius: 50%; font-size: 1.1rem;
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(9,9,15,0.9); border: 2px solid var(--accent);
    color: var(--text); cursor: pointer; font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 0.75rem; letter-spacing: 0.05em;
    z-index: 3; transition: all 0.2s;
  }
  #spinBtn:hover { background: var(--accent); color: #fff; }
  #spinBtn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Coin */
  .coin-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 10px 0; }
  .coin {
    width: 120px; height: 120px; border-radius: 50%; cursor: pointer;
    position: relative; transform-style: preserve-3d;
    transition: transform 0.1s; perspective: 1000px;
  }
  .coin.flipping { animation: coinFlip 0.8s ease-in-out; }
  @keyframes coinFlip {
    0%{transform:rotateX(0deg)} 25%{transform:rotateX(720deg)}
    75%{transform:rotateX(1440deg)} 100%{transform:rotateX(0deg)}
  }
  .coin-face {
    width: 120px; height: 120px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; border: 4px solid;
    position: absolute; inset: 0;
    box-shadow: inset 0 -4px 10px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.3);
  }
  .coin-heads { background: radial-gradient(circle at 35% 35%, #f7d44c, #c8a020); border-color: #b8900a; }
  .coin-tails { background: radial-gradient(circle at 35% 35%, #c0c0d0, #8090a0); border-color: #607080; display: none; }
  .coin-result { font-size: 1.6rem; font-weight: 800; letter-spacing: 0.05em; }
  .coin-sub { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }
  .coin-stats { display: flex; gap: 20px; }
  .stat-box { text-align: center; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; }
  .stat-val { font-size: 1.5rem; font-weight: 800; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); margin-top: 2px; }

  /* Password */
  .pass-result {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; font-family: 'DM Mono', monospace;
    font-size: clamp(0.75rem, 2.5vw, 1rem); word-break: break-all; letter-spacing: 0.08em;
    color: var(--text); min-height: 56px; margin: 16px 0;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .pass-text { flex: 1; }
  .strength-bar-wrap { margin-bottom: 16px; }
  .strength-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 3px; transition: width 0.4s, background 0.4s; }
  .strength-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-top: 6px; }

  /* Checkboxes */
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
  .custom-check { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .custom-check input { appearance: none; width: 18px; height: 18px; border-radius: 5px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); cursor: pointer; position: relative; flex-shrink: 0; }
  .custom-check input:checked { background: var(--accent); border-color: var(--accent); }
  .custom-check input:checked::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-size: 11px; font-weight: 700; }
  .custom-check span { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); }

  /* Colour picker tool */
  .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 8px; margin: 12px 0; }
  .color-swatch { width: 100%; aspect-ratio: 1; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; display: flex; align-items: flex-end; justify-content: center; padding: 4px; overflow: hidden; }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.3); }
  .color-label { font-family: 'DM Mono', monospace; font-size: 0.5rem; color: rgba(255,255,255,0.7); text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

  /* UUID */
  .uuid-output { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--accent3); word-break: break-all; line-height: 2; }
  .uuid-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 6px; }
  .uuid-item:hover { background: rgba(255,255,255,0.06); }

  /* Countdown */
  .countdown-display { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 16px 0; }
  .count-box { text-align: center; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; min-width: 70px; }
  .count-val { font-size: 2rem; font-weight: 800; line-height: 1; }
  .count-unit { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.1em; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    header { padding: 24px 20px 0; }
    .hero { padding: 40px 20px 20px; }
    .tools-section { padding: 24px 16px 60px; }
    .tools-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .tool-card { padding: 16px 10px 14px; }
    .tool-icon { width: 44px; height: 44px; font-size: 1.3rem; }
    .tool-name { font-size: 0.75rem; }

// ──────────────────────────────────────────────

let randHistory = [];
function buildRandomizer() {

      </div>
    </div>

    <!-- LIST -->
    <div class="rand-panel" id="rp-list">
      <p class="rand-hint">Paste any list of words or names, then randomly pick one or more. Perfect for choosing a restaurant, movie, or winner from entries.</p>
      <div class="input-group" style="margin-bottom:12px">

      <div class="result-display" id="listResult" style="flex-direction:column;gap:10px">

    <!-- GROUPS -->

    <!-- SEQUENCE -->
    <div class="rand-panel" id="rp-sequence">
      <p class="rand-hint">Generate every number in a range, then shuffle the entire order randomly. Useful for creating a random play order, turn rotation, or randomised bracket.</p>
      <div class="num-controls">

        <div class="input-group"><label>TO</label><input type="number" id="seqTo" value="10"></div>

      </div>

      </div>

let weightedItems = [];
let lastGroups = [];
let lastSeqArr = [];

function switchRandTab(id, el) {
  document.querySelectorAll('.rand-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.rand-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('rp-' + id).classList.add('active');
}

function rollSingle() {
  const mn = +document.getElementById('rMin').value, mx = +document.getElementById('rMax').value;
  if (mn > mx) { toast('Min must be ≤ Max'); return; }
  const n = Math.floor(Math.random() * (mx - mn + 1)) + mn;
  randHistory.unshift({ val: n, range: `${mn}–${mx}`, time: new Date().toLocaleTimeString() });
  if (randHistory.length > 8) randHistory.pop();
  document.getElementById('rSingleResult').innerHTML = `<div class="result-number">${n}</div><div class="result-label">from ${mn} to ${mx}</div>`;
  renderHistory();
}
function clearHistory() { randHistory = []; renderHistory(); }
function renderHistory() {
  const el = document.getElementById('rHistory');
  if (!el) return;
  el.innerHTML = randHistory.length ? '<div style="font-family:\'DM Mono\',monospace;font-size:0.65rem;color:var(--muted);margin:10px 0 6px;letter-spacing:0.1em">HISTORY</div>' + randHistory.map(h => `<div class="history-item"><span>${h.time} · ${h.range}</span><span class="history-val">${h.val}</span></div>`).join('') : '';
}

function rollMulti() {
  const mn = +document.getElementById('rmMin').value, mx = +document.getElementById('rmMax').value;
  const cnt = Math.min(Math.max(+document.getElementById('rmCount').value, 1), 50);
  const dupes = document.getElementById('rmDupes').value === 'yes';
  const sort = document.getElementById('rmSort').checked;
  if (mn > mx) { toast('Min must be ≤ Max'); return; }
  if (!dupes && cnt > (mx - mn + 1)) { toast('Range too small for unique numbers'); return; }
  let nums = [];
  if (dupes) { for (let i = 0; i < cnt; i++) nums.push(Math.floor(Math.random() * (mx - mn + 1)) + mn); }
  else {
    const pool = []; for (let i = mn; i <= mx; i++) pool.push(i);
    for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [pool[i],pool[j]] = [pool[j],pool[i]]; }
    nums = pool.slice(0, cnt);
  }
  if (sort) nums.sort((a,b) => a-b);
  const sum = nums.reduce((a,b)=>a+b,0), avg = (sum/nums.length).toFixed(1), min2 = Math.min(...nums), max2 = Math.max(...nums);
  document.getElementById('rmResult').innerHTML = `
    <div class="results-list">${nums.map((n,i)=>`<div class="result-pill ${i===0?'highlight':''}">${n}</div>`).join('')}</div>
    <div style="display:flex;gap:16px;font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);flex-wrap:wrap;justify-content:center;margin-top:4px">
      <span>SUM <b style="color:var(--text)">${sum}</b></span>
      <span>AVG <b style="color:var(--text)">${avg}</b></span>
      <span>MIN <b style="color:var(--text)">${min2}</b></span>
      <span>MAX <b style="color:var(--text)">${max2}</b></span>
      <span>COUNT <b style="color:var(--text)">${nums.length}</b></span>
    </div>`;
}

function rollList() {
  const raw = document.getElementById('listItems').value.trim();
  if (!raw) { toast('Enter some items first'); return; }
  let items = raw.includes('\n') ? raw.split('\n') : raw.split(',');
  items = items.map(s => s.trim()).filter(Boolean);
  if (!items.length) { toast('No valid items found'); return; }
  const cnt = Math.min(+document.getElementById('listCount').value || 1, items.length);
  const dupes = document.getElementById('listDupes').value === 'yes';
  let picked = [];
  if (dupes) { for (let i = 0; i < cnt; i++) picked.push(items[Math.floor(Math.random() * items.length)]); }
  else {
    const shuffled = [...items].sort(() => Math.random()-0.5);
    picked = shuffled.slice(0, Math.min(cnt, shuffled.length));
  }
  document.getElementById('listResult').innerHTML = `
    <div class="results-list">${picked.map((p,i) => `<div class="result-pill ${i===0?'highlight':''}">${p}</div>`).join('')}</div>
    <div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);margin-top:6px">picked ${picked.length} of ${items.length} items</div>`;
}

// ── GROUPS ──
function parseGroupItems() {
  const raw = document.getElementById('grpItems').value.trim();
  if (!raw) return [];
  let items = raw.includes('\n') ? raw.split('\n') : raw.split(',');
  return items.map(s => s.trim()).filter(Boolean);
}

function makeGroups() {
  const items = parseGroupItems();
  if (items.length < 2) { toast('Add at least 2 members'); return; }
  const gCount = Math.min(Math.max(+document.getElementById('grpCount').value || 2, 2), items.length);
  if (gCount > items.length) { toast('More groups than members!'); return; }
  // Shuffle items
  const shuffled = [...items];
  for (let i = shuffled.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]] = [shuffled[j],shuffled[i]]; }
  // Distribute
  const groups = Array.from({length: gCount}, () => []);
  shuffled.forEach((item, idx) => groups[idx % gCount].push(item));
  lastGroups = groups;
  renderGroups();
}

function reshuffleGroups() {
  const items = parseGroupItems();
  if (items.length < 2) { toast('Add members first'); return; }
  makeGroups();
}

const GROUP_COLORS = ['#7c5cfc','#fc5c7d','#5cf0fc','#fcdb5c','#5cfc8e','#fc9d5c','#c05cfc','#5c9ffc','#fc5cdc','#9cfc5c'];

function renderGroups() {
  const el = document.getElementById('grpResult');
  if (!el || !lastGroups.length) return;
  const prefix = document.getElementById('grpPrefix').value.trim() || 'Group';
  const labelMembers = document.getElementById('grpLabel').checked;
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:0.1em">${lastGroups.length} GROUPS · ${lastGroups.flat().length} MEMBERS</div>
    </div>
    <div class="grp-grid">
      ${lastGroups.map((group, gi) => {
        const color = GROUP_COLORS[gi % GROUP_COLORS.length];
        return `
        <div class="grp-card" style="--gc:${color}">
          <div class="grp-title">
            <span class="grp-dot" style="background:${color}"></span>
            ${prefix} ${gi + 1}
            <span class="grp-count">${group.length}</span>
          </div>
          <div class="grp-members">
            ${group.map((m, mi) => `<div class="grp-member"><span class="grp-num">${labelMembers ? mi+1 : '·'}</span>${m}</div>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function copyGroups() {
  if (!lastGroups.length) { toast('Generate groups first'); return; }
  const prefix = document.getElementById('grpPrefix').value.trim() || 'Group';
  const text = lastGroups.map((g, i) => `${prefix} ${i+1}:\n${g.map((m,j)=>`  ${j+1}. ${m}`).join('\n')}`).join('\n\n');
  copyText(text);
}

function rollSequence() {
  const from = +document.getElementById('seqFrom').value, to = +document.getElementById('seqTo').value;
  if (from > to) { toast('From must be ≤ To'); return; }
  if (to - from > 99) { toast('Max range is 100 numbers'); return; }
  const arr = []; for (let i = from; i <= to; i++) arr.push(i);
  for (let i = arr.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]] = [arr[j],arr[i]]; }
  lastSeqArr = arr;
  document.getElementById('seqResult').innerHTML = `
    <div class="results-list">${arr.map((n,i) => `<div class="result-pill ${i===0?'highlight':''}">${n}</div>`).join('')}</div>
    <div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);margin-top:4px">${arr.length} numbers in shuffled order</div>`;
}
function copySeqResult() {
  if (!lastSeqArr.length) { toast('Generate a sequence first'); return; }
  copyText(lastSeqArr.join(', '));
}

function loadWeightedPreset() {
  weightedItems = [{name:'Common',weight:50},{name:'Uncommon',weight:30},{name:'Rare',weight:15},{name:'Epic',weight:4},{name:'Legendary',weight:1}];
  renderWeighted();
}
function addWeighted() {
  const item = document.getElementById('wItem').value.trim(), weight = Math.max(1, Math.min(100, +document.getElementById('wWeight').value||1));
  if (!item) { toast('Enter an item name'); return; }
  weightedItems.push({ name: item, weight });
  document.getElementById('wItem').value = '';
  renderWeighted();
}
function clearWeighted() { weightedItems = []; renderWeighted(); }
function renderWeighted() {
  const el = document.getElementById('weightedList');
  if (!el) return;
  const total = weightedItems.reduce((s,i)=>s+i.weight,0);
  if (!weightedItems.length) { el.innerHTML = `<div style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);text-align:center;padding:12px">No items yet — add some above</div>`; return; }
  el.innerHTML = `
    <div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:8px;letter-spacing:0.1em">${weightedItems.length} ITEMS · TOTAL WEIGHT: ${total}</div>
    ${weightedItems.map((it,idx) => {
      const pct = total ? (it.weight/total*100).toFixed(1) : 0;
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:5px">
        <div style="flex:1;min-width:0">
          <div style="font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.name}</div>
          <div style="height:4px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:5px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:var(--accent);border-radius:2px;transition:width 0.4s"></div>
          </div>
        </div>
        <span style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);white-space:nowrap">${it.weight}× · ${pct}%</span>
        <button onclick="weightedItems.splice(${idx},1);renderWeighted()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;padding:2px 4px;flex-shrink:0" title="Remove">✕</button>
      </div>`;
    }).join('')}`;
}
function rollWeighted() {
  if (!weightedItems.length) { toast('Add some items first'); return; }
  const total = weightedItems.reduce((s,i)=>s+i.weight,0);
  let r = Math.random() * total, cumul = 0, chosen;
  for (const it of weightedItems) { cumul += it.weight; if (r <= cumul) { chosen = it; break; } }
  if (!chosen) chosen = weightedItems[weightedItems.length-1];
  const pct = (chosen.weight/total*100).toFixed(1);
  document.getElementById('wResult').innerHTML = `<div class="result-number" style="font-size:2rem">${chosen.name}</div><div class="result-label">weight ${chosen.weight} · ${pct}% probability</div>`;
}

let selectedDice = 6, diceCount = 1;
function buildDice() {
  const body = document.getElementById('panelBody');
  body.innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:10px;letter-spacing:0.1em">DICE TYPE</div>
      <div class="dice-grid">
        ${[4,6,8,10,12,20,100].map(d=>`<button class="dice-select-btn ${d===6?'active':''}" onclick="selectDice(${d},this)">d${d}</button>`).join('')}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap">
      <div class="input-group" style="max-width:120px"><label>NUMBER OF DICE</label><input type="number" id="diceCount" value="1" min="1" max="20" oninput="diceCount=Math.min(20,Math.max(1,+this.value))"></div>
      <div class="input-group" style="max-width:120px"><label>ADD MODIFIER</label><input type="number" id="diceMod" value="0" placeholder="+/-"></div>
    </div>
    <div class="action-row">

      <button class="btn btn-secondary btn-sm" onclick="rollDice()">Re-roll</button>
    </div>
    <div class="dice-roll-display" id="diceDisplay"><span style="color:var(--muted);font-family:'DM Mono',monospace;font-size:0.75rem">Choose dice and roll</span></div>
    <div class="result-display" id="diceTotalDisplay" style="min-height:60px"></div>
    <div class="history-list" id="diceHistory"></div>
  `;
}
let diceLog = [];
function selectDice(n, el) {
  document.querySelectorAll('.dice-select-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); selectedDice = n;
}
function rollDice() {
  const count = Math.min(Math.max(+document.getElementById('diceCount').value||1,1),20);
  const mod = +document.getElementById('diceMod').value||0;
  const rolls = Array.from({length:count}, ()=>Math.floor(Math.random()*selectedDice)+1);
  const sum = rolls.reduce((a,b)=>a+b,0) + mod;
  const display = document.getElementById('diceDisplay');
  display.innerHTML = rolls.map(r=>`<div class="die">${r}</div>`).join('');
  document.getElementById('diceTotalDisplay').innerHTML = `<div class="result-number">${sum}</div><div class="result-label">${rolls.join(' + ')}${mod?` + (${mod>0?'+':''}${mod})`:''} = ${sum}</div>`;
  diceLog.unshift(`${count}d${selectedDice}${mod?`+${mod}`:''} → ${sum}`);
  if (diceLog.length > 6) diceLog.pop();
  document.getElementById('diceHistory').innerHTML = diceLog.length ? '<div style="font-family:\'DM Mono\',monospace;font-size:0.65rem;color:var(--muted);margin:12px 0 6px;letter-spacing:0.1em">HISTORY</div>' + diceLog.map(l=>`<div class="history-item"><span class="history-val">${l}</span></div>`).join('') : '';
}

// ──────────────────────────────────────────────
// 3. WHEEL
// ──────────────────────────────────────────────
let wheelItems = ['Option 1','Option 2','Option 3','Option 4','Option 5'];
let wheelAngle = 0, spinning = false;
const WHEEL_COLORS = ['#7c5cfc','#fc5c7d','#5cf0fc','#fcdb5c','#5cfc8e','#fc9d5c','#c05cfc','#5c9ffc'];

function buildWheel() {
  const body = document.getElementById('panelBody');
  body.innerHTML = `
    <div class="wheel-container">
      <div class="wheel-entries" style="width:100%">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <input type="text" id="wEntry" placeholder="Add an option..." style="flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.85rem;outline:none">
          <button class="btn btn-primary btn-sm" onclick="addWheelEntry()">+ Add</button>
        </div>
        <div class="wheel-entry-list" id="wheelTagList"></div>
        <div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:16px">${wheelItems.length} items loaded</div>
      </div>
      <div class="wheel-canvas-wrap">
        <div class="wheel-pointer"></div>
        <canvas id="wheelCanvas" width="280" height="280"></canvas>
        <button id="spinBtn" onclick="spinWheel()">SPIN</button>
      </div>
      <div class="result-display" id="wheelResult" style="width:100%;min-height:60px">
        <span style="color:var(--muted);font-family:'DM Mono',monospace;font-size:0.75rem">Spin the wheel to get a result</span>
      </div>
    </div>
  `;
  renderWheelTags(); drawWheel(wheelAngle);
  document.getElementById('wEntry').addEventListener('keydown', e => { if(e.key==='Enter') addWheelEntry(); });
}
function renderWheelTags() {
  const el = document.getElementById('wheelTagList');
  if (!el) return;
  el.innerHTML = wheelItems.map((it,i)=>`<div class="wheel-entry-tag" style="border-color:${WHEEL_COLORS[i%WHEEL_COLORS.length]}44;color:${WHEEL_COLORS[i%WHEEL_COLORS.length]}">${it}<button onclick="removeWheelItem(${i})">✕</button></div>`).join('');
}
function removeWheelItem(i) { wheelItems.splice(i,1); renderWheelTags(); drawWheel(wheelAngle); }
function addWheelEntry() {
  const val = document.getElementById('wEntry').value.trim();
  if (!val) return;
  wheelItems.push(val); document.getElementById('wEntry').value = '';
  renderWheelTags(); drawWheel(wheelAngle);
}
function drawWheel(angle) {
  const canvas = document.getElementById('wheelCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d'), n = wheelItems.length, cx = 140, cy = 140, r = 134;
  ctx.clearRect(0,0,280,280);
  if (!n) { ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); return; }
  const slice = (Math.PI*2)/n;
  for (let i=0;i<n;i++) {
    const start = angle+i*slice, end = start+slice;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end); ctx.closePath();
    ctx.fillStyle = WHEEL_COLORS[i%WHEEL_COLORS.length]+'cc'; ctx.fill();
    ctx.strokeStyle='rgba(9,9,15,0.8)'; ctx.lineWidth=2; ctx.stroke();
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(start+slice/2);
    ctx.textAlign='right'; ctx.fillStyle='#fff';
    const fs = Math.max(10, Math.min(14, 220/Math.max(wheelItems[i].length,1)));
    ctx.font = `bold ${fs}px Syne`;
    ctx.fillText(wheelItems[i].substring(0,14), r-10, 5);
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2);
  ctx.fillStyle='rgba(9,9,15,0.95)'; ctx.fill();
  ctx.strokeStyle='var(--accent)'; ctx.lineWidth=2; ctx.stroke();
}
function spinWheel() {
  if (spinning || !wheelItems.length) { if(!wheelItems.length) toast('Add items first'); return; }
  spinning = true; document.getElementById('spinBtn').disabled = true;
  const extra = Math.PI*2*(5+Math.random()*5), duration = 4000;
  const start = performance.now(), startAngle = wheelAngle, endAngle = startAngle + extra;
  function animate(now) {
    const t = Math.min((now-start)/duration, 1);
    const ease = 1-Math.pow(1-t,4);
    wheelAngle = startAngle + (endAngle-startAngle)*ease;
    drawWheel(wheelAngle);
    if (t < 1) { requestAnimationFrame(animate); return; }
    spinning = false; document.getElementById('spinBtn').disabled = false;
    const n = wheelItems.length, norm = (((-wheelAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2));
    const idx = Math.floor(norm / (Math.PI*2/n)) % n;
    const winner = wheelItems[idx];
    const el = document.getElementById('wheelResult');
    if (el) el.innerHTML = `<div class="result-number" style="font-size:1.8rem">🎉 ${winner}</div><div class="result-label">spin again to try</div>`;
  }
  requestAnimationFrame(animate);
}

// 4. COIN
// ──────────────────────────────────────────────
let heads=0, tails=0, coinSide='heads';
function buildCoin() {
  const body = document.getElementById('panelBody');
  body.innerHTML = `
    <div class="coin-wrap">
      <div class="coin" id="coinEl" onclick="flipCoin()">
        <div class="coin-face coin-heads" id="coinFace">👑</div>
      </div>
      <div id="coinText">
        <div class="coin-result" id="coinResult" style="text-align:center">—</div>
        <div class="coin-sub" style="text-align:center">Click coin or button to flip</div>
      </div>
      <button class="btn btn-primary" onclick="flipCoin()">🪙 Flip Coin</button>
      <button class="btn btn-secondary btn-sm" onclick="flipMultiple()">Flip 10×</button>
      <div class="coin-stats">
        <div class="stat-box"><div class="stat-val" id="headsCount">0</div><div class="stat-label">HEADS</div></div>
        <div class="stat-box"><div class="stat-val" id="tailsCount">0</div><div class="stat-label">TAILS</div></div>
        <div class="stat-box"><div class="stat-val" id="totalCount">0</div><div class="stat-label">TOTAL</div></div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="resetCoin()">Reset Stats</button>
    </div>
  `;
}
function flipCoin() {
  const coin = document.getElementById('coinEl');
  coin.classList.remove('flipping');
  void coin.offsetWidth;
  coin.classList.add('flipping');
  setTimeout(() => {
    const side = Math.random() < 0.5 ? 'heads' : 'tails';
    coinSide = side;
    if (side==='heads') heads++; else tails++;
    document.getElementById('coinResult').textContent = side === 'heads' ? '👑 HEADS' : '🛡 TAILS';
    document.getElementById('coinFace').textContent = side === 'heads' ? '👑' : '🛡';
    document.getElementById('coinFace').style.background = side === 'heads' ? 'radial-gradient(circle at 35% 35%, #f7d44c, #c8a020)' : 'radial-gradient(circle at 35% 35%, #c0c0d0, #8090a0)';
    document.getElementById('headsCount').textContent = heads;
    document.getElementById('tailsCount').textContent = tails;
    document.getElementById('totalCount').textContent = heads+tails;
  }, 400);
}
function flipMultiple() {
  let h=0, t=0;
  for (let i=0;i<10;i++) { if(Math.random()<0.5) h++; else t++; }
  heads+=h; tails+=t;
  document.getElementById('headsCount').textContent = heads;
  document.getElementById('tailsCount').textContent = tails;
  document.getElementById('totalCount').textContent = heads+tails;
  document.getElementById('coinResult').textContent = `H:${h} T:${t} (10 flips)`;
}
function resetCoin() { heads=0; tails=0; document.getElementById('headsCount').textContent=0; document.getElementById('tailsCount').textContent=0; document.getElementById('totalCount').textContent=0; document.getElementById('coinResult').textContent='—'; }

// ──────────────────────────────────────────────
// 5. PASSWORD
// ──────────────────────────────────────────────
function buildPassword() {
  const body = document.getElementById('panelBody');
  body.innerHTML = `
    <div class="input-group" style="margin-bottom:16px">
      <label>LENGTH: <span id="passLenLabel">16</span> characters</label>
      <input type="range" id="passLen" min="4" max="128" value="16" oninput="document.getElementById('passLenLabel').textContent=this.value;genPassword()" style="width:100%;accent-color:var(--accent)">
    </div>
    <div class="checkbox-group" style="margin-bottom:16px">
      <label class="custom-check"><input type="checkbox" id="pUpper" checked onchange="genPassword()"><span>Uppercase (A–Z)</span></label>
      <label class="custom-check"><input type="checkbox" id="pLower" checked onchange="genPassword()"><span>Lowercase (a–z)</span></label>
      <label class="custom-check"><input type="checkbox" id="pNum" checked onchange="genPassword()"><span>Numbers (0–9)</span></label>
      <label class="custom-check"><input type="checkbox" id="pSym" onchange="genPassword()"><span>Symbols (!@#$...)</span></label>
      <label class="custom-check"><input type="checkbox" id="pNoAmb" onchange="genPassword()"><span>Exclude ambiguous (l,1,O,0)</span></label>
    </div>
    <div class="pass-result" id="passResult">
      <span class="pass-text" id="passText">—</span>
      <button class="btn btn-secondary btn-sm" onclick="copyPass()">Copy</button>
    </div>
    <div class="strength-bar-wrap">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%"></div></div>
      <div class="strength-label" id="strengthLabel">—</div>
    </div>
    <div class="action-row">
      <button class="btn btn-primary" onclick="genPassword()">🔄 Regenerate</button>
      <div class="input-group" style="max-width:120px"><label>GENERATE #</label>
        <select id="genCount"><option>1</option><option>5</option><option>10</option></select>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="genMultiPass()">Batch Generate</button>
    </div>
    <div id="batchPassList" style="margin-top:12px"></div>
  `;
  genPassword();
}
function getPassChars() {
  let chars = '';
  if (document.getElementById('pUpper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (document.getElementById('pLower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
  if (document.getElementById('pNum').checked) chars += '0123456789';
  if (document.getElementById('pSym').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
  if (document.getElementById('pNoAmb').checked) chars = chars.replace(/[l1O0]/g,'');
  return chars;
}
function genPassword() {
  const len = +document.getElementById('passLen').value;
  const chars = getPassChars();
  if (!chars) { document.getElementById('passText').textContent = 'Select at least one character type'; return; }
  let pass = ''; for (let i=0;i<len;i++) pass += chars[Math.floor(Math.random()*chars.length)];
  document.getElementById('passText').textContent = pass;
  rateStrength(pass);
}
function rateStrength(p) {
  let score = 0;
  if (p.length >= 8) score++; if (p.length >= 12) score++; if (p.length >= 20) score++;
  if (/[A-Z]/.test(p)) score++; if (/[a-z]/.test(p)) score++;
  if (/[0-9]/.test(p)) score++; if (/[^A-Za-z0-9]/.test(p)) score++;
  const levels = [{w:10,c:'#fc5c7d',l:'Weak'},{w:30,c:'#fcdb5c',l:'Fair'},{w:55,c:'#fc9d5c',l:'Good'},{w:80,c:'#5cfc8e',l:'Strong'},{w:100,c:'#7c5cfc',l:'Very Strong'}];
  const idx = Math.min(Math.floor(score/7*5),4);
  const lv = levels[idx];
  document.getElementById('strengthFill').style.cssText = `width:${lv.w}%;background:${lv.c}`;
  document.getElementById('strengthLabel').textContent = `Strength: ${lv.l}`;
}
function copyPass() { const t = document.getElementById('passText').textContent; copyText(t); }
function genMultiPass() {
  const n = +document.getElementById('genCount').value;
  const chars = getPassChars(), len = +document.getElementById('passLen').value;
  if (!chars) { toast('Select char types'); return; }
  let list = [];
  for (let i=0;i<n;i++) { let p=''; for(let j=0;j<len;j++) p+=chars[Math.floor(Math.random()*chars.length)]; list.push(p); }
  document.getElementById('batchPassList').innerHTML = list.map(p=>`<div class="uuid-item"><span class="uuid-output" style="font-size:0.75rem">${p}</span><button class="btn btn-secondary btn-sm" onclick="copyText('${p}')">Copy</button></div>`).join('');
}

// ──────────────────────────────────────────────
// 6. UUID
// ──────────────────────────────────────────────
function buildUUID() {
  const body = document.getElementById('panelBody');
  body.innerHTML = `
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end">
      <div class="input-group" style="max-width:120px"><label>VERSION</label>
        <select id="uuidVersion"><option value="4">v4 (Random)</option><option value="custom">Custom</option></select>
      </div>
      <div class="input-group" style="max-width:100px"><label>COUNT</label>
        <input type="number" id="uuidCount" value="5" min="1" max="50">
      </div>
      <button class="btn btn-primary" onclick="genUUIDs()">⚡ Generate</button>
    </div>
    <div id="uuidList"></div>
    <div class="action-row" style="margin-top:12px">
      <button class="btn btn-secondary btn-sm" onclick="copyAllUUIDs()">Copy All</button>
      <button class="btn btn-danger btn-sm" onclick="document.getElementById('uuidList').innerHTML=''">Clear</button>
    </div>
  `;
  genUUIDs();
}
let lastUUIDs = [];
function genUUID4() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c=>{
    const r=Math.random()*16|0, v=c==='x'?r:(r&0x3|0x8); return v.toString(16);
  });
}
function genUUIDs() {
  const n = Math.min(+document.getElementById('uuidCount').value||5, 50);
  lastUUIDs = Array.from({length:n}, genUUID4);
  document.getElementById('uuidList').innerHTML = lastUUIDs.map(id=>`
    <div class="uuid-item">
      <span class="uuid-output">${id}</span>
      <button class="btn btn-secondary btn-sm" onclick="copyText('${id}')">Copy</button>
    </div>`).join('');
}
function copyAllUUIDs() { copyText(lastUUIDs.join('\n')); }
</script>
